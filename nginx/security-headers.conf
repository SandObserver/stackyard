# Server-level security headers. nginx add_header does not inherit into a
# location that sets any add_header of its own, so every such location includes
# this file to restate them. X-Frame-Options and Content-Security-Policy are set
# per location (they differ for /admin and /widgets/) and are not here.
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
