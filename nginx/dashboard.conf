server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # ── Security headers ──
    # Note: HSTS is intentionally omitted — this listener is HTTP only.
    # If you terminate TLS upstream (reverse proxy), add HSTS there instead.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://images.unsplash.com https://cdn.jsdelivr.net; frame-src 'self'; connect-src 'self' https://api.unsplash.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com;" always;

    # ── PWA manifest ──
    location = /manifest.json {
        try_files /manifest.json =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Type "application/manifest+json" always;
    }

    # ── iOS apple-touch-icon — served directly, no redirect.
    # iOS PWA install reads this path at add-to-homescreen time; redirects are not followed.
    location = /apple-touch-icon.png {
        alias /icons/favicon.png;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /apple-touch-icon-precomposed.png {
        alias /icons/favicon.png;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── Dashboard root ──
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    # ── Admin UI ──
    location ^~ /admin {
        try_files /admin/index.html =404;
        add_header X-Frame-Options "DENY" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net; font-src 'self';" always;
    }

    # ── Icons ──
    # User icons are mounted at /icons (not under the Nginx root).
    # alias is required here — try_files resolves under root and would 404.
    location /icons/ {
        alias /icons/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Don't let browsers cache 404s — new uploads should appear immediately
        error_page 404 = @icon_miss;
    }
    location @icon_miss {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    # ── Widget HTML files ──
    # X-Frame-Options cleared so the dashboard can embed widgets as iframes.
    # CSP scoped to what widgets actually need: API calls, Unsplash images.
    # Note: style-src 'unsafe-inline' is required — widgets use JS DOM style assignments
    # which cannot be removed without a prior inline-style inventory and refactor.
    location ^~ /widgets/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com;" always;
    }

    # ── API proxy ──
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-store" always;
        # If Node hangs (e.g. slow badge fetch), give up after 15s and return 504
        proxy_read_timeout    15s;
        proxy_connect_timeout 5s;
        proxy_send_timeout    15s;
    }

    # ── Shared JS modules ──
    # ES modules loaded by both dashboard and admin. No-cache so updates
    # are picked up immediately without a hard refresh.
    location /js/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/javascript";
    }

    # ── External CSS ──
    location /css/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "text/css";
    }

    # ── Static assets (only in /icons/ — JS and CSS have their own no-cache rules above) ──
    location ~* ^/icons/.*\.(woff2)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── No cache for HTML ──
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}
