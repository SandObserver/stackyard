version: 2
updates:
  # CI tooling (Biome, TypeScript, @types/node). These are the only npm deps; the runtime has none.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns: ["*"]

  # Base image (node:24-alpine); security and version patches land here.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  # Pinned GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
