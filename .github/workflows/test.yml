name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run backend tests
        run: npm test
        working-directory: api

      - name: Run frontend tests
        run: node --test
        working-directory: ui/test

      - name: Install dev tooling
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck (backend)
        run: npm run typecheck

      - name: Typecheck (frontend, opt-in files)
        run: npm run typecheck:ui
