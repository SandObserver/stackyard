<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Clock</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }

  .widget {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px; padding: 12px 12px;
  }
  .mode-dark  { background: #1c1c1e; }
  .mode-light { background: #ffffff; }

  canvas { flex-shrink: 0; display: block; }

  .date-line {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.09em; text-transform: uppercase;
    white-space: nowrap; line-height: 1; flex-shrink: 0;
  }
  .mode-dark  .date-line { color: rgba(255,255,255,0.40); }
  .mode-light .date-line { color: rgba(0,0,0,0.35); }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;animation:none !important} }
</style>
</head>
<body>
<div class="widget mode-dark" id="widget" role="img" aria-label="Clock">
  <canvas id="clock-canvas" aria-hidden="true"></canvas>
  <div class="date-line" id="date-line" aria-hidden="true"></div>
</div>
<script>
const id  = new URLSearchParams(location.search).get('id') || '';
const API = '/api';

const _DFULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const _MFULL=['January','February','March','April','May','June','July','August','September','October','November','December'];
function _a11yLabel(now){
  const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
  return `${hh}:${mm}, ${_DFULL[now.getDay()]}, ${_MFULL[now.getMonth()]} ${now.getDate()}`;
}


let _mode     = 'dark';
let _timezone = '';
let _showDate = true;
let _tickId   = null;
let _canvas   = null;
let _ctx      = null;
let _sz       = 0;

function theme() {
  const dark = _mode === 'dark';
  return {
    bg:    dark ? '#1c1c1e' : '#ffffff',
    shD:   dark ? 'rgba(0,0,0,0.75)'       : 'rgba(163,175,195,0.65)',
    shL:   dark ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,1.0)',
    faceC: dark ? '#242428' : '#f8f8fc',
    faceE: dark ? '#1a1a1d' : '#e8e8ef',
    hand:  dark ? 'rgba(255,255,255,0.90)' : 'rgba(20,20,30,0.82)',
    tick:  dark ? 'rgba(255,255,255,0.28)' : 'rgba(0,0,0,0.20)',
    cap:   dark ? '#3a3a3e' : '#d0d0d8',
  };
}

function buildShell() {
  const w  = document.getElementById('widget');
  const dl = document.getElementById('date-line');
  w.className = 'widget mode-' + _mode;
  _canvas = document.getElementById('clock-canvas');

  const ww    = w.clientWidth  || 220;
  const wh    = w.clientHeight || 150;
  const dateH = _showDate ? 20 : 0;
  const pad   = 16;
  _sz = Math.max(40, Math.min(ww - pad, wh - dateH - pad));

  const dpr = window.devicePixelRatio || 1;
  _canvas.width  = Math.round(_sz * dpr);
  _canvas.height = Math.round(_sz * dpr);
  _canvas.style.width  = _sz + 'px';
  _canvas.style.height = _sz + 'px';
  _ctx = _canvas.getContext('2d');
  _ctx.scale(dpr, dpr);

  dl.style.display = _showDate ? '' : 'none';
}

function drawFace() {
  const ctx = _ctx, sz = _sz, cx = sz/2, cy = sz/2, R = sz/2 - 6;
  const t = theme();
  ctx.clearRect(0, 0, sz, sz);

  ctx.save();
  ctx.shadowColor = t.shD; ctx.shadowBlur = R * 0.28;
  ctx.shadowOffsetX = R * 0.12; ctx.shadowOffsetY = R * 0.14;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fillStyle = t.bg; ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.shadowColor = t.shL; ctx.shadowBlur = R * 0.22;
  ctx.shadowOffsetX = -(R * 0.10); ctx.shadowOffsetY = -(R * 0.10);
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fillStyle = t.bg; ctx.fill();
  ctx.restore();

  const grad = ctx.createRadialGradient(cx - R*0.15, cy - R*0.15, 0, cx, cy, R);
  grad.addColorStop(0, t.faceC); grad.addColorStop(1, t.faceE);
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();

  [0, 90, 180, 270].forEach(deg => {
    const rad = (deg - 90) * Math.PI / 180;
    ctx.save();
    ctx.strokeStyle = t.tick;
    ctx.lineWidth = Math.max(1.5, sz * 0.018);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx + (R-1) * Math.cos(rad), cy + (R-1) * Math.sin(rad));
    ctx.lineTo(cx + (R - R*0.16) * Math.cos(rad), cy + (R - R*0.16) * Math.sin(rad));
    ctx.stroke();
    ctx.restore();
  });
}

function drawHands(h, m) {
  const ctx = _ctx, sz = _sz, cx = sz/2, cy = sz/2, R = sz/2 - 6;
  const t  = theme();
  const hw = Math.max(2, sz * 0.030);

  function hand(deg, len) {
    const rad = (deg - 90) * Math.PI / 180;
    ctx.save();
    ctx.strokeStyle = t.hand; ctx.lineWidth = hw; ctx.lineCap = 'round';
    ctx.shadowColor = _mode==='dark' ? 'rgba(0,0,0,0.55)' : 'rgba(0,0,0,0.15)';
    ctx.shadowBlur = 3; ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;
    ctx.beginPath();
    ctx.moveTo(cx - R*0.10 * Math.cos(rad), cy - R*0.10 * Math.sin(rad));
    ctx.lineTo(cx + len * Math.cos(rad), cy + len * Math.sin(rad));
    ctx.stroke();
    ctx.restore();
  }

  hand(((h%12) + m/60) * 30, R * 0.50);
  hand(m * 6,                 R * 0.70);

  ctx.beginPath();
  ctx.arc(cx, cy, hw * 0.9, 0, Math.PI*2);
  ctx.fillStyle = t.cap; ctx.fill();
}

function tick() {
  const now = _timezone
    ? new Date(new Date().toLocaleString('en-US', { timeZone: _timezone }))
    : new Date();
  document.getElementById('widget').setAttribute('aria-label', _a11yLabel(now));
  drawFace();
  drawHands(now.getHours(), now.getMinutes());
  if (_showDate) {
    const D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('date-line').textContent =
      `${D[now.getDay()]}, ${M[now.getMonth()]} ${now.getDate()}`;
  }
  if (_tickId) clearTimeout(_tickId);
  _tickId = setTimeout(tick, (60 - now.getSeconds()) * 1000);
}

async function boot() {
  try {
    const r = await fetch(`${API}/widget-config/${encodeURIComponent(id)}`);
    if (r.ok) { const d = await r.json(); const wc = d.widgetConfig||{};
      _mode     = wc.clockMode     || 'dark';
      _timezone = wc.clockTimezone || '';
      _showDate = wc.clockShowDate !== false;
    }
  } catch {}
  buildShell();
  tick();
}

boot();
</script>
</body>
</html>
