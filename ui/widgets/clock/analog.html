<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Clock</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }

  .widget {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 12px;
  }
  .mode-dark  { background: #1c1c1e; }
  .mode-light { background: #ffffff; }

  .face { position: relative; }

  .disc {
    position: absolute; left: 50%; top: 50%;
    transform-origin: 50% 50%;
    will-change: transform;
  }
  .disc svg { display: block; overflow: visible; }
  .mode-dark  .disc svg circle { mix-blend-mode: screen; }
  .mode-light .disc svg circle { mix-blend-mode: multiply; }

  .date-line {
    position: absolute; left: 0; right: 0; text-align: center;
    font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    white-space: nowrap; line-height: 1; pointer-events: none;
  }
  .mode-dark  .date-line { color: rgba(255,255,255,0.46); }
  .mode-light .date-line { color: rgba(0,0,0,0.42); }

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;animation:none !important} }
</style>
</head>
<body>
<div class="widget mode-dark" id="widget" role="img" aria-label="Clock">
  <div class="face" id="face" aria-hidden="true"></div>
</div>
<script>
const id  = new URLSearchParams(location.search).get('id') || '';
const API = '/api';
const NS  = 'http://www.w3.org/2000/svg';

const _DFULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const _MFULL=['January','February','March','April','May','June','July','August','September','October','November','December'];
function _a11yLabel(now){
  const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
  return `${hh}:${mm}, ${_DFULL[now.getDay()]}, ${_MFULL[now.getMonth()]} ${now.getDate()}`;
}

const _reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
const COLORS = {
  dark:  { hour:'#ff2d2d', minute:'#ffe400', second:'#0a96ff', tick:'rgba(255,255,255,0.92)', dot:'#111' },
  light: { hour:'#ff2d4d', minute:'#ffe400', second:'#00b8e6', tick:'rgba(0,0,0,0.55)',       dot:'#222' },
};

let _mode='dark', _timezone='', _showDate=true;
let _discs=null, _rafId=null, _running=false, _sz=0;

function _now(){
  return _timezone
    ? new Date(new Date().toLocaleString('en-US', { timeZone: _timezone }))
    : new Date();
}

function buildShell(){
  const w=document.getElementById('widget');
  const face=document.getElementById('face');
  w.className='widget mode-'+_mode;
  face.innerHTML='';

  const ww=w.clientWidth||220, wh=w.clientHeight||150;
  _sz=Math.max(40, Math.min(ww-24, wh-24));
  face.style.width=_sz+'px';
  face.style.height=_sz+'px';

  const col=COLORS[_mode];
  const rHour=_sz*0.345, rMinSec=_sz*0.285, dist=_sz*0.175;
  const specs=[
    { key:'hour',   r:rHour,   color:col.hour   },
    { key:'minute', r:rMinSec, color:col.minute },
    { key:'second', r:rMinSec, color:col.second },
  ];

  _discs={};
  for(const sp of specs){
    const wrap=document.createElement('div');
    wrap.className='disc';
    const box=(sp.r+dist)*2;
    const svg=document.createElementNS(NS,'svg');
    svg.setAttribute('width',box); svg.setAttribute('height',box);
    svg.setAttribute('viewBox',`${-box/2} ${-box/2} ${box} ${box}`);
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',0); c.setAttribute('cy',-dist); c.setAttribute('r',sp.r);
    c.setAttribute('fill',sp.color);
    const tickLen=Math.max(6, _sz*0.058), tw=Math.max(2, _sz*0.016);
    const ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1',0); ln.setAttribute('y1',-dist-sp.r+tickLen);
    ln.setAttribute('x2',0); ln.setAttribute('y2',-dist-sp.r);
    ln.setAttribute('stroke',col.tick); ln.setAttribute('stroke-width',tw); ln.setAttribute('stroke-linecap','round');
    svg.append(c, ln);
    wrap.appendChild(svg);
    wrap.style.marginLeft=(-box/2)+'px';
    wrap.style.marginTop=(-box/2)+'px';
    face.appendChild(wrap);
    _discs[sp.key]=wrap;
  }

  const dot=document.createElement('div');
  const dotR=Math.max(3, _sz*0.026);
  dot.style.cssText=`position:absolute;left:50%;top:50%;width:${dotR*2}px;height:${dotR*2}px;`+
    `margin-left:${-dotR}px;margin-top:${-dotR}px;border-radius:50%;background:${col.dot};`;
  face.appendChild(dot);

  const dl=document.createElement('div');
  dl.className='date-line';
  dl.id='date-line';
  dl.style.fontSize=Math.max(9, Math.round(_sz*0.066))+'px';
  dl.style.bottom=Math.round(_sz*0.03)+'px';
  dl.style.display=_showDate?'':'none';
  face.appendChild(dl);
}

function _rotate(el, deg){ el.style.transform=`rotate(${deg}deg)`; }

function render(smoothSeconds){
  const now=_now();
  const h=now.getHours(), m=now.getMinutes(), s=now.getSeconds(), ms=now.getMilliseconds();
  _rotate(_discs.hour,   ((h%12)+m/60)*30);
  _rotate(_discs.minute, (m+s/60)*6);
  _rotate(_discs.second, (s + (smoothSeconds ? ms/1000 : 0))*6);

  document.getElementById('widget').setAttribute('aria-label', _a11yLabel(now));
  if(_showDate){
    const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('date-line').textContent=`${D[now.getDay()]}, ${M[now.getMonth()]} ${now.getDate()}`;
  }
}

function _loop(){
  if(!_running) return;
  render(true);
  _rafId=requestAnimationFrame(_loop);
}

let _stepId=null;
function _step(){
  if(!_running) return;
  render(false);
  _stepId=setTimeout(_step, 1000 - (_now().getMilliseconds()));
}

function start(){
  if(_running) return;
  _running=true;
  if(_reduceMotion) _step(); else _loop();
}
function stop(){
  _running=false;
  if(_rafId){ cancelAnimationFrame(_rafId); _rafId=null; }
  if(_stepId){ clearTimeout(_stepId); _stepId=null; }
}

document.addEventListener('visibilitychange', ()=>{
  if(document.hidden) stop();
  else { render(!_reduceMotion); start(); }
});

let _io=null;
function watchVisibility(){
  if(!('IntersectionObserver' in window)) return;
  _io=new IntersectionObserver(entries=>{
    for(const e of entries){
      if(e.isIntersecting && !document.hidden) start();
      else stop();
    }
  }, { threshold: 0 });
  _io.observe(document.getElementById('face'));
}

let _rzId=null;
addEventListener('resize', ()=>{
  clearTimeout(_rzId);
  _rzId=setTimeout(()=>{ const run=_running; stop(); buildShell(); render(!_reduceMotion); if(run) start(); }, 150);
});

async function boot(){
  try{
    const r=await fetch(`${API}/widget-config/${encodeURIComponent(id)}`);
    if(r.ok){ const d=await r.json(); const wc=d.widgetConfig||{};
      _mode=wc.clockMode||'dark';
      _timezone=wc.clockTimezone||'';
      _showDate=wc.clockShowDate!==false;
    }
  }catch{}
  buildShell();
  render(!_reduceMotion);
  watchVisibility();
  start();
}

boot();
</script>
</body>
</html>
