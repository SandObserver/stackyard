  const POP={US:331,CA:38,MX:130,BR:214,AR:46,CO:51,CL:19,PE:34,VE:28,GB:67,IE:5,NL:17,DE:83,FR:65,ES:47,PT:10,IT:59,CH:9,AT:9,BE:12,SE:10,NO:5,DK:6,FI:6,IS:0.37,PL:38,CZ:11,RO:19,BG:7,HU:10,GR:11,UA:43,RU:144,BY:9.4,EE:1.3,LV:1.9,LT:2.8,MD:2.6,RS:7,HR:4,SK:5,SI:2,TR:85,IL:9,AE:10,SA:35,QA:2.7,KW:4.3,OM:5,BH:1.7,JO:10,LB:5.5,SY:18,IQ:41,IR:89,YE:30,EG:104,JP:125,KR:52,CN:1412,HK:7.5,TW:24,IN:1408,PK:231,BD:170,NP:30,LK:22,ID:274,MY:33,TH:70,VN:97,PH:111,MM:54,KH:17,LA:7,SG:5.9,MN:3.3,KZ:19,UZ:34,AZ:10,AM:3,GE:3.7,KG:6.7,TM:6,AU:26,NZ:5,PG:9,ZA:60,NG:206,KE:54,ET:118,GH:31,TZ:60,UG:46,CD:90,CM:27,CI:27,SN:17,ML:21,GN:13,GA:2.2,AO:33,DZ:44,MA:37,TN:12,LY:7,SD:45,SS:11,MG:28,MZ:31,MW:19,ZW:15,NA:2.5,MU:1.3,DJ:1,SO:16,NI:6.6,PA:4.3,DO:11,GT:18,HN:10,SV:6.5,CR:5,JM:3,CU:11,GY:0.8,EC:18,BO:12,PY:7,UY:3.5};
  const params=new URLSearchParams(location.search);
  const id=params.get('id')||'';
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  const TAU=6.28318530718, ASPECT=360/(D.maxLat-D.minLat), BW=1100;

  const clamp=(v,a,b)=>v<a?a:v>b?b:v;
  const dist2=(p,q)=>(p[0]-q[0])*(p[0]-q[0])+(p[1]-q[1])*(p[1]-q[1]);
  const hexRgb=h=>{h=(h||'').replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');
    const n=parseInt(h,16);return isFinite(n)?[(n>>16)&255,(n>>8)&255,n&255]:[175,82,222];};
  const rgbCss=a=>'rgb('+a.join(',')+')';

  // per-country dot lists + centroids
  const byCountry={}, centroid={};
  (function(){const dt=D.dots,ci=D.countries;
    for(let k=0;k<dt.length;k+=3){const cc=ci[dt[k+2]];(byCountry[cc]||(byCountry[cc]=[])).push([dt[k],dt[k+1]]);}
    for(const cc in byCountry){const a=byCountry[cc];let sx=0,sy=0;a.forEach(d=>{sx+=d[0];sy+=d[1];});centroid[cc]=[sx/a.length,sy/a.length];}
  })();

  function lonLatToGrid(lon,lat){return [(lon+180)/360*D.cols-0.5,(D.maxLat-lat)/(D.maxLat-D.minLat)*D.rows-0.5];}
  function nearestDot(col,row){const dt=D.dots;let best=-1,bd=1e9;
    for(let k=0;k<dt.length;k+=3){const d=(dt[k]-col)*(dt[k]-col)+(dt[k+1]-row)*(dt[k+1]-row);if(d<bd){bd=d;best=k;}}
    return best>=0?(dt[best]+','+dt[best+1]):null;}

  const esc=x=>String(x==null?'':x).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const fmtName=cc=>{try{return new Intl.DisplayNames(['en'],{type:'region'}).of(cc)||cc;}catch(e){return cc;}};
  let active={}, activeInfo={}, legend=[], showLegend=true;
  let emphasis=null;
  function kick(){requestAnimationFrame(draw);}
  function openUrl(u){if(!u)return;try{const a=document.createElement('a');a.href=u;a.target='_blank';a.rel='noopener noreferrer';document.body.appendChild(a);a.click();a.remove();}catch(_){window.open(u,'_blank','noopener,noreferrer');}}


  function paintRegions(reg,limit,connected,COL,role,name){
    const sig={};let sigMax=1e-9;
    for(const cc in reg){const pop=POP[cc]||20;const v=reg[cc]/pop;sig[cc]=v;if(v>sigMax)sigMax=v;}
    const capF=limit>0?clamp(connected/limit,0,1):0.6;
    const globalA=0.6+0.4*capF;
    const colCss=rgbCss(COL);
    for(const cc in reg){
      const list=byCountry[cc];if(!list||!list.length)continue;
      const u=reg[cc], total=list.length;
      const n=clamp(2+Math.floor(2.2*Math.log1p(u)),2,Math.max(2,Math.floor(total*0.8)));
      const rel=sig[cc]/sigMax;
      const alpha=clamp(globalA*(0.78+0.22*rel),0.74,1);
      const scale=1.25+0.95*rel;
      const cen=centroid[cc];
      const sorted=list.slice().sort((a,b)=>dist2(a,cen)-dist2(b,cen)).slice(0,n);
      sorted.forEach(d=>{const key=d[0]+','+d[1];active[key]={color:COL,alpha,scale};activeInfo[key]={role,serviceName:name,color:colCss,cc,users:u};});
    }
  }

  function computeLayers(data){
    active={};activeInfo={};legend=[];
    const meta=data.meta||{};
    showLegend = meta.showLegend!==false;
    const services=(Array.isArray(data.services)?data.services.slice():[]).sort((a,b)=>String(a&&a.name||'').toLowerCase().localeCompare(String(b&&b.name||'').toLowerCase()));
    services.forEach((svc,idx)=>{
      const COL=hexRgb(svc.color||'#AF52DE'), colCss=rgbCss(COL);
      const role=svc.id||(svc.type+'-'+idx);
      const name=svc.name||svc.type||'Service';
      const chip={name,color:colCss,role,adminUrl:svc.adminUrl||''};
      if(svc.error){ chip.error=svc.error; legend.push(chip); return; }
      if(svc.kind==='regions' && svc.regions && Object.keys(svc.regions).length){
        paintRegions(svc.regions, svc.limit||0, svc.connected||0, COL, role, name);
        legend.push(chip);
      } else if(svc.kind==='point' && isFinite(svc.lat) && isFinite(svc.lng)){
        const [c,r]=lonLatToGrid(svc.lng,svc.lat);const key=nearestDot(c,r);
        if(key){active[key]={color:COL,alpha:1,scale:2.2,glow:true,glowR:2.4,pulse:true};activeInfo[key]={role,serviceName:name,color:colCss,city:(svc.city||''),country:(svc.country||'')};}
        legend.push(chip);
      } else {
        legend.push(chip); /* enabled but no data yet — still show in legend */
      }
    });
    renderLegend();
  }

  // legend overlay
  let legendEl=null;
  function renderLegend(){
    if(legendEl){legendEl.remove();legendEl=null;}
    if(!showLegend||!legend.length)return;
    legendEl=document.createElement('div');
    legendEl.style.cssText='position:absolute;left:50%;bottom:9px;transform:translateX(-50%);'+
      'display:flex;gap:6px;align-items:center;padding:4px 5px;border-radius:13px;'+
      'background:rgba(28,28,32,.62);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);'+
      'font:600 10.5px -apple-system,system-ui,sans-serif;color:rgba(235,235,245,.85);'+
      'white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.3);';
    legend.forEach(l=>{
      const it=document.createElement('button');it.type='button';
      const clickable=!!l.adminUrl;
      it.style.cssText='all:unset;display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:9px;'+
        'cursor:'+(clickable?'pointer':'default')+';transition:background .12s,opacity .12s;color:inherit;'+
        'font:inherit;-webkit-tap-highlight-color:transparent;';
      it.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:'+l.color+';box-shadow:0 0 5px '+l.color+'"></span>'+esc(l.name);
      it.setAttribute('aria-label', l.name+(clickable?' — open admin':''));
      const emph=()=>{emphasis=l.role;it.style.background='rgba(255,255,255,.10)';legendEl.querySelectorAll('button').forEach(b=>{if(b!==it)b.style.opacity='.45';});kick();};
      const clear=()=>{emphasis=null;legendEl.querySelectorAll('button').forEach(b=>{b.style.background='none';b.style.opacity='1';});kick();};
      it.addEventListener('pointerenter',emph);
      it.addEventListener('pointerleave',clear);
      it.addEventListener('focus',emph);
      it.addEventListener('blur',clear);
      if(clickable) it.addEventListener('click',()=>openUrl(l.adminUrl));
      legendEl.appendChild(it);
    });
    document.body.appendChild(legendEl);
  }

  let L=null;
  function relayout(){
    const cw=cv.clientWidth||360,ch=cv.clientHeight||170;
    const BH=Math.max(120,Math.round(BW*ch/cw));
    cv.width=BW;cv.height=BH;
    let mapW,mapH;
    if(BW/BH>ASPECT){mapH=BH;mapW=BH*ASPECT;}else{mapW=BW;mapH=BW/ASPECT;}
    const sx=mapW/D.cols,sy=mapH/D.rows;
    L={W:BW,H:BH,offX:(BW-mapW)/2,offY:(BH-mapH)/2,sx,sy,r:Math.min(sx,sy)*0.34};
  }

  let t0=performance.now();
  function draw(now){
    if(!L)relayout();
    const {W,H,offX,offY,sx,sy,r}=L;
    ctx.clearRect(0,0,W,H);
    const dt=D.dots;
    const pulse=reduce?1:(0.82+0.18*Math.sin((now-t0)/1500));
    // base grid: uniform dim dots (drawn first)
    ctx.fillStyle='rgba(228,228,236,0.16)';
    for(let k=0;k<dt.length;k+=3){
      if(active[dt[k]+','+dt[k+1]])continue;
      const x=offX+(dt[k]+0.5)*sx, y=offY+(dt[k+1]+0.5)*sy;
      ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();
    }
    // active dots
    for(const key in active){
      const hit=active[key];const info=activeInfo[key];const p=key.split(',');
      const x=offX+(+p[0]+0.5)*sx, y=offY+(+p[1]+0.5)*sy;
      const dim = emphasis && info && info.role!==emphasis;
      const af = dim ? 0.12 : 1;
      const rv=r*(hit.scale||1)*(hit.pulse&&!reduce?pulse:1)*(dim?0.85:1);
      if(hit.glow && !dim){
        const gR=rv*(hit.glowR||2.4);
        const g=ctx.createRadialGradient(x,y,0,x,y,gR);
        g.addColorStop(0,'rgba('+hit.color.join(',')+',0.45)');g.addColorStop(1,'rgba('+hit.color.join(',')+',0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,gR,0,TAU);ctx.fill();
      }
      ctx.beginPath();ctx.arc(x,y,rv,0,TAU);
      ctx.fillStyle='rgba('+hit.color.join(',')+','+((hit.alpha||1)*af)+')';ctx.fill();
    }
    let anyPulse=false;for(const k in active){if(active[k].pulse){anyPulse=true;break;}}
    if(!reduce&&(anyPulse||emphasis))requestAnimationFrame(draw);
  }
  function redraw(){relayout();requestAnimationFrame(draw);}

  async function load(){
    if(!id)return;
    try{
      const r=await fetch('/api/map-data/'+encodeURIComponent(id),{cache:'no-store'});
      const d=await r.json();
      computeLayers(d);redraw();
    }catch(e){}
  }
  // tooltip
  const tt=document.createElement('div');tt.id='tt';
  tt.style.cssText='position:absolute;pointer-events:none;z-index:6;opacity:0;transition:opacity .12s ease;'+
    'min-width:118px;max-width:210px;padding:9px 11px;border-radius:13px;'+
    'background:rgba(30,30,34,.84);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);'+
    'box-shadow:0 8px 26px rgba(0,0,0,.5);border:.5px solid rgba(255,255,255,.1);'+
    'font-family:-apple-system,system-ui,sans-serif;color:#fff;';
  document.body.appendChild(tt);
  function showTip(info,cx,cy){
    const dotc=info.color||'#AF52DE';
    let h='<div style="font:700 11px/1.2 -apple-system;display:flex;align-items:center;gap:6px;margin-bottom:5px;color:rgba(235,235,245,.82)"><span style="width:7px;height:7px;border-radius:50%;background:'+dotc+';box-shadow:0 0 5px '+dotc+'"></span>'+esc(info.serviceName||'')+'</div>';
    if(info.cc!=null){
      h+='<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px"><span style="font:700 14px/1.15 -apple-system;letter-spacing:-.01em">'+esc(fmtName(info.cc))+'</span><span style="font:600 10px -apple-system;color:#30D158;display:inline-flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:#30D158"></span>Online</span></div>'+
        '<div style="display:flex;justify-content:space-between;gap:16px;font:500 12px/1.2 -apple-system;color:rgba(235,235,245,.62)"><span>Users</span><span style="color:#fff;font-weight:600;font-variant-numeric:tabular-nums">'+info.users+'</span></div>';
    } else {
      h+='<div style="font:600 14px/1.15 -apple-system;letter-spacing:-.01em">'+esc((info.city?info.city+', ':'')+info.country)+'</div>';
    }
    tt.innerHTML=h;tt.style.opacity='1';
    const pad=8,ww=window.innerWidth,wh=window.innerHeight,tw=tt.offsetWidth,th=tt.offsetHeight;
    let x=cx+13,y=cy+13;
    if(x+tw>ww-pad)x=cx-tw-13;if(x<pad)x=pad;
    if(y+th>wh-pad)y=cy-th-13;if(y<pad)y=pad;
    tt.style.left=x+'px';tt.style.top=y+'px';
  }
  function hideTip(){tt.style.opacity='0';}
  function hitTest(cx,cy){
    if(!L)return null;
    const rect=cv.getBoundingClientRect();
    const bx=(cx-rect.left)*L.W/rect.width, by=(cy-rect.top)*L.H/rect.height;
    const thr=Math.max(L.sx,L.sy)*1.7, thr2=thr*thr;
    let best=null,bd=1e9;
    for(const key in active){
      const info=activeInfo[key];if(!info)continue;
      const p=key.split(',');
      const x=L.offX+(+p[0]+0.5)*L.sx, y=L.offY+(+p[1]+0.5)*L.sy;
      const d=(x-bx)*(x-bx)+(y-by)*(y-by);
      if(d<bd){bd=d;best={info,d};}
    }
    return (best&&best.d<thr2)?best.info:null;
  }
  cv.addEventListener('pointermove',e=>{const i=hitTest(e.clientX,e.clientY);if(i){showTip(i,e.clientX,e.clientY);cv.style.cursor='pointer';}else{hideTip();cv.style.cursor='default';}});
  cv.addEventListener('pointerleave',hideTip);
  cv.addEventListener('pointerdown',e=>{const i=hitTest(e.clientX,e.clientY);if(i)showTip(i,e.clientX,e.clientY);else hideTip();});

  new ResizeObserver(redraw).observe(cv);
  redraw();load();setInterval(load,60000);

})();
</script>
</body>
</html>
