<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Now Playing</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif}

  .widget{width:100%;height:100%;position:relative;border-radius:inherit;overflow:hidden;
    background:linear-gradient(160deg,#3c3c3e,#2b2b2d 60%,#242426)}
  .widget.clickable{cursor:pointer}
  .widget.clickable:focus-visible{outline:2px solid #5ab0ff;outline-offset:-3px}
  .widget::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    box-shadow:inset 3px 0 0 rgba(0,0,0,.22),inset -3px 0 0 rgba(0,0,0,.22),
      inset 0 1px 0 rgba(255,255,255,.06),inset 0 0 0 1px rgba(0,0,0,.3)}

  .stage{position:absolute;inset:0}
  .stage.outL{animation:outL .2s ease-in forwards}
  .stage.outR{animation:outR .2s ease-in forwards}
  .stage.inR{animation:inR .28s cubic-bezier(.22,.7,.3,1) forwards}
  .stage.inL{animation:inL .28s cubic-bezier(.22,.7,.3,1) forwards}
  @keyframes outL{to{transform:translateX(-114%);opacity:0}}
  @keyframes outR{to{transform:translateX(114%);opacity:0}}
  @keyframes inR{from{transform:translateX(114%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes inL{from{transform:translateX(-114%);opacity:0}to{transform:translateX(0);opacity:1}}

  .sticker{position:absolute;left:14px;right:14px;top:11px;height:84px;
    background:linear-gradient(180deg,#e6e6e6,#d2d2d2);border-radius:6px;
    border:1px solid rgba(0,0,0,.18);box-shadow:0 1px 2px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.6);
    padding:7px 10px;display:flex;flex-direction:column;gap:2px;overflow:hidden}
  .title{font-size:12px;font-weight:700;line-height:1.16;color:#222;
    display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .sub{flex:none;font-size:9px;font-weight:600;line-height:1.12;color:#4d4d4d;letter-spacing:.02em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}
  .idle .title{color:#6f6f6f;font-weight:600}

  .window{position:absolute;left:14px;right:14px;top:100px;bottom:14px;
    background:radial-gradient(135% 135% at 50% 20%,#5a5a5e,#4c4c50 58%,#444448);
    border-radius:5px 5px 38px 38px;overflow:hidden;
    box-shadow:inset 0 2px 5px rgba(0,0,0,.5),inset 0 0 0 1px rgba(0,0,0,.28)}

  .tape{position:absolute;left:71px;top:-8px;border-radius:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 50% 46%,#202020,#0d0d0d 80%);transition:width .6s ease,height .6s ease}
  .strand{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .spinwrap{position:absolute;left:71px;top:-8px;width:88px;height:88px;margin:-44px 0 0 -44px;color:#9a9a9a}
  .spinwrap .reel{width:100%;height:100%;display:block;transform-origin:center;
    animation:spin 3.6s linear infinite;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))}
  .spinwrap.paused .reel{animation-play-state:paused}
  @keyframes spin{to{transform:rotate(360deg)}}

  .glass{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .ticks{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
    display:flex;flex-direction:column;gap:6px;opacity:.5}
  .ticks i{display:block;width:12px;height:2px;background:#eaeaea;border-radius:1px}

  .arrow{position:absolute;top:97px;transform:translateY(-50%);width:24px;height:34px;
    border:0;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:#f0f0f0;opacity:.92;transition:opacity .15s;z-index:3}
  .arrow svg{width:17px;height:17px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))}
  .arrow.l{left:0}.arrow.r{right:0}
  .arrow:disabled{opacity:.2;cursor:default}
  .arrow:not(:disabled):hover{opacity:1}
  .arrow:focus-visible{outline:2px solid #fff;outline-offset:1px;border-radius:4px;opacity:1}

  .sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0}

  @media(prefers-reduced-motion:reduce){
    .spinwrap .reel{animation:none!important}
    .stage{animation:none!important}
    .tape{transition:none!important}
  }
</style>
</head>
<body>
<div class="widget idle" id="w" role="group" aria-label="Now Playing">
  <button class="arrow l" id="prev" type="button" aria-label="Previous item" disabled>
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 12.9H8.2l4.1 4.1-1.2 1.2L5 12l6.1-6.2 1.2 1.2L8.2 11.1H21z"/></svg>
  </button>
  <button class="arrow r" id="next" type="button" aria-label="Next item" disabled>
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 11.1h12.8l-4.1-4.1 1.2-1.2L19 12l-6.1 6.2-1.2-1.2 4.1-4.1H3z"/></svg>
  </button>
  <div class="stage" id="stage">
    <div class="sticker" id="sticker" aria-live="polite">
      <div class="title" id="title">Nothing playing</div>
      <div class="sub" id="sub"></div>
    </div>
    <div class="window">
      <div class="tape" id="tape"></div>
      <svg class="strand" viewBox="0 0 142 56" preserveAspectRatio="none" aria-hidden="true">
        <path id="strandpath" d="M142 19 L74 30 L74 36 L142 25 Z" fill="#141414"/>
      </svg>

          <path d=" M 882.57 83.76 C 893.71 81.75 905.58 83.83 915.25 89.75 C 927.33 96.96 935.83 109.85 937.59 123.81 C 939.03 134.51 936.65 145.68 930.91 154.83 C 923.43 166.90 910.26 175.30 896.11 176.72 C 883.13 178.20 869.63 173.95 859.91 165.21 C 848.02 154.96 842.06 138.44 844.53 122.96 C 847.21 103.57 863.25 87.00 882.57 83.76 Z" fill="#f4f4f4"/>
          <path d=" M 928.55 180.66 C 931.53 178.37 934.33 175.85 936.92 173.13 C 941.69 177.90 945.38 183.59 949.66 188.79 C 951.57 191.20 953.50 193.63 955.01 196.34 C 955.18 198.10 954.89 200.15 953.27 201.18 C 938.14 212.82 920.17 221.31 901.10 223.60 C 898.01 223.83 894.19 224.86 891.98 221.99 C 891.00 219.11 890.72 216.06 890.49 213.05 C 890.07 206.35 889.16 199.69 889.04 192.98 C 892.86 193.06 896.71 192.85 900.51 192.31 C 901.86 195.99 902.85 199.85 904.75 203.29 C 905.08 203.49 905.73 203.89 906.06 204.08 C 915.44 202.77 924.32 198.89 932.63 194.46 C 935.61 193.27 933.57 189.96 932.97 187.86 C 931.74 185.36 931.56 181.65 928.55 180.66 Z" fill="currentColor" transform="translate(890.54 129.97) scale(0.86) translate(-890.54 -129.97)"/>
        </svg>
      </div>
      <svg class="glass" viewBox="0 0 142 56" preserveAspectRatio="none" aria-hidden="true">
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.17"/>
          <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/></linearGradient></defs>
        <path transform="translate(-177,-27.8) scale(0.415)" d=" M 577.29 67.02 C 609.06 66.98 640.82 67.00 672.59 67.01 C 683.76 98.92 695.07 130.78 706.19 162.71 C 709.02 170.59 704.38 179.96 696.51 182.67 C 678.35 189.17 660.14 195.56 641.96 202.01 C 635.92 204.29 628.64 202.47 624.43 197.58 C 620.94 193.44 620.07 187.90 618.08 183.00 C 611.55 183.02 605.01 182.95 598.48 183.06 C 598.32 182.00 597.54 180.65 598.97 180.13 C 604.97 179.76 611.01 180.12 617.03 179.99 C 614.45 172.66 611.86 165.33 609.30 157.99 C 612.48 157.99 615.66 157.94 618.84 157.84 C 618.84 157.17 618.83 155.84 618.82 155.17 C 615.35 155.04 611.88 154.98 608.42 154.95 C 608.52 155.71 608.72 157.23 608.82 157.98 C 605.52 157.96 602.20 158.20 598.92 157.88 C 597.58 157.29 598.30 155.94 598.51 154.91 C 601.75 155.01 604.99 155.00 608.24 154.99 C 597.93 125.67 587.62 96.34 577.29 67.02 Z" fill="url(#g)"/>
      </svg>
      <div class="ticks" aria-hidden="true"><i></i><i></i><i></i></div>
    </div>
  </div>
  <span class="sr" id="sr" aria-live="polite"></span>
</div>
<script>
  const API='/api';
  const id=new URLSearchParams(location.search).get('id')||'';
  const TICK_MS=10000;
  const COLORS={plex:'#e5a00d',jellyfin:'#007ca6',emby:'#4caf50',navidrome:'#0084ff'};
  const PROVIDER_NAME={plex:'Plex',jellyfin:'Jellyfin',emby:'Emby',navidrome:'Navidrome'};
  const TAPE_MIN=64, TAPE_MAX=126, TAPE_NOPROG=92;
  const reduced=matchMedia('(prefers-reduced-motion:reduce)').matches;

  const wEl=document.getElementById('w'), stage=document.getElementById('stage');
  const titleEl=document.getElementById('title'), subEl=document.getElementById('sub');
  const tapeEl=document.getElementById('tape'), spinEl=document.getElementById('spin'), reelEl=document.getElementById('reel');
  const prevB=document.getElementById('prev'), nextB=document.getElementById('next'), srEl=document.getElementById('sr');
  const strandEl=document.getElementById('strandpath');

  let sessions=[], provider='', idx=0, href='';

  function tapeSize(s){
    if(!s) return TAPE_MIN;
    if(s.progress==null) return TAPE_NOPROG;
    return TAPE_MIN+(TAPE_MAX-TAPE_MIN)*Math.min(1,Math.max(0,s.progress));
  }
  function describe(s){
    if(!s) return 'Nothing playing';
    let t='Now playing: '+(s.title||'');
    if(s.subtitle) t+=', '+s.subtitle;
    if(PROVIDER_NAME[provider]) t+=' — '+PROVIDER_NAME[provider];
    if(s.state==='paused') t+=' (paused)';
    return t;
  }
  function paint(announce){
    const s=sessions[idx];
    reelEl.parentElement.style.color=COLORS[provider]||'#9a9a9a';
    const d = s ? tapeSize(s) : TAPE_MIN;
    if(!s){
      wEl.classList.add('idle');
      titleEl.textContent='Nothing playing'; subEl.textContent='';
      spinEl.classList.add('paused');
    }else{
      wEl.classList.remove('idle');
      titleEl.textContent=s.title||''; subEl.textContent=s.subtitle||'';
      spinEl.classList.toggle('paused', s.state==='paused');
    }
    tapeEl.style.width=d+'px'; tapeEl.style.height=d+'px';
    // strand: fixed anchor on the right edge, left end rides the bottom of the wound tape
    let ly=-8+d/2-2; if(ly>52)ly=52; if(ly<18)ly=18;
    strandEl.setAttribute('d', `M142 19 L74 ${(ly-3).toFixed(1)} L74 ${(ly+3).toFixed(1)} L142 25 Z`);
    const label=describe(s);
    wEl.setAttribute('aria-label', href? label+'. Activate to open link.' : label);
    if(announce) srEl.textContent=label;
    const many=sessions.length>1;
    prevB.disabled=!many; nextB.disabled=!many;
  }
  function once(el,fn){ const h=()=>{el.removeEventListener('animationend',h);fn();}; el.addEventListener('animationend',h); }
  function nav(dir){
    if(sessions.length<2) return;
    idx=(idx+dir+sessions.length)%sessions.length;
    if(reduced){ paint(true); return; }
    const out=dir>0?'outL':'outR', inn=dir>0?'inR':'inL';
    stage.classList.remove('inR','inL');
    stage.classList.add(out);
    once(stage,()=>{ stage.classList.remove(out); paint(true); stage.classList.add(inn);
      once(stage,()=>stage.classList.remove(inn)); });
  }
  prevB.addEventListener('click',e=>{e.stopPropagation();nav(-1);});
  nextB.addEventListener('click',e=>{e.stopPropagation();nav(1);});

  function openHref(){ if(href) window.open(href,'_blank','noopener,noreferrer'); }

  async function tick(){
    try{
      const r=await fetch(`${API}/widget-data/${encodeURIComponent(id)}`);
      const d=await r.json().catch(()=>({}));
      provider=d.provider||provider;
      const next=Array.isArray(d.sessions)?d.sessions:[];
      const changed=JSON.stringify(next)!==JSON.stringify(sessions);
      sessions=next;
      if(idx>=sessions.length) idx=0;
      paint(changed);
    }catch(e){ sessions=[]; paint(false); }
  }
  async function boot(){
    try{
      const r=await fetch(`${API}/widget-config/${encodeURIComponent(id)}`);
      if(r.ok){ const c=await r.json(); href=(c&&c.widgetConfig&&c.widgetConfig.href)||''; }
    }catch(e){}
    if(href){
      wEl.classList.add('clickable');
      wEl.setAttribute('role','link');
      wEl.setAttribute('tabindex','0');
      wEl.addEventListener('click',openHref);
      wEl.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openHref(); } });
    }
    await tick(); setInterval(tick,TICK_MS);
  }
  boot();
</script>
</body>
</html>
