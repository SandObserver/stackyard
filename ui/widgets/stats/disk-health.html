<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disk Health</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  }

  #root {
    width:100%; height:100%;
    display:flex;
    padding:12px 11px 10px 12px;
    gap:10px;
    background:#2c2d30;
  }

  #left { flex:1; display:flex; flex-direction:column; min-width:0; }

  #well {
    flex:1; min-height:0;
    border-radius:7px;
    padding:7px 7px 11px;
    background:#202123;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.7),
                inset 0 0 0 1px rgba(0,0,0,0.45),
                inset 0 -1px 0 rgba(255,255,255,0.03);
    display:flex;
  }
  #bays { display:flex; flex:1; width:100%; gap:5px; min-height:0; }

  .bay {
    flex:1 1 0; min-width:0;
    border-radius:4px;
    position:relative;
    overflow:hidden;
    background:#3a3b3f;
    cursor:default;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .bay.empty {
    background:#161719;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4);
  }
  .bay.assigned { cursor:pointer; }
  .bay.assigned:hover,
  .bay.assigned.touch-active,
  .bay.assigned.peer-hover {
    transform: translateY(-2px);
    background:#45464a;
    z-index:2;
  }

  .bay-hole {
    position:absolute; top:64%; left:50%; transform:translate(-50%,-50%);
    width:clamp(9px,26%,13px); aspect-ratio:1; border-radius:50%;
    background:#2b2c2f; box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.4);
  }
  .bay-hole::after {
    content:''; position:absolute; inset:34%; border-radius:50%; background:#46474b;
  }
  .bay-handle {
    position:absolute; top:80%; left:50%; transform:translateX(-50%);
    width:2px; height:8%; border-radius:1px; background:rgba(0,0,0,0.4);
  }

  #nums { height:13px; flex-shrink:0; display:flex; align-items:center; padding:0 7px; }
  #nums span { flex:1; text-align:center; font-size:clamp(6px,2vmin,8px); font-weight:500; color:rgba(255,255,255,0.18); }

  #right { flex-shrink:0; display:flex; flex-direction:column; padding:2px 0; }
  #root.size-small  #right { width:54px; }
  #root.size-medium #right { width:104px; }

  #status { display:grid; gap:7px 8px; }
  #root.size-small  #status { grid-template-columns:1fr; }
  #root.size-medium #status { grid-template-columns:1fr 1fr; }

  .st {
    display:flex; align-items:center; gap:6px; height:12px;
    justify-content:flex-end;
    cursor:default;
    border-radius:3px;
    transition: background 0.15s ease;
  }
  .st.assigned { cursor:pointer; }
  .st.assigned:hover, .st.assigned.touch-active, .st.assigned.peer-hover { background:rgba(255,255,255,0.06); }
  .st b {
    font-size:clamp(7px,2.4vmin,9px); font-weight:600; letter-spacing:0.02em;
    color:rgba(255,255,255,0.5);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-align:right; flex:1; min-width:0;
  }
  .st i {
    width:6px; height:6px; border-radius:50%; flex-shrink:0;
    background:#4a4b4f; transition: background 0.2s;
  }
  .st i.green  { background:#2fd35a; }
  .st i.yellow { background:#ffcc00; }
  .st i.red    { background:#ff3b30; }

  #footer { margin-top:auto; padding-top:8px; position:relative; display:flex; align-items:center; justify-content:center; }
  #pwrbtn {
    width:21px; height:21px; border-radius:50%;
    background:#202123;
    display:flex; align-items:center; justify-content:center;
    transition:opacity 0.15s ease;
  }
  #infostrip {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    gap:6px; padding:0 4px;
    opacity:0; transition:opacity 0.15s ease;
    pointer-events:none; overflow:hidden;
  }
  #root.info-active #pwrbtn    { opacity:0; pointer-events:none; }
  #root.info-active #infostrip { opacity:1; }
  .is-label { font-size:10px; font-weight:600; color:rgba(255,255,255,0.82);
              white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:1; min-width:0; }
  .is-sep   { width:1px; height:10px; background:rgba(255,255,255,0.15); flex-shrink:0; }
  .is-temp  { font-size:10px; font-weight:500; color:rgba(255,255,255,0.55); white-space:nowrap; flex-shrink:0; }

  @media (prefers-reduced-motion: reduce){
    .bay,.st,.st i,#pwrbtn,#infostrip{transition:none !important}
  }
</style>
</head>
<body>
<div id="root" class="size-small" role="group" aria-label="Disk health">
  <div id="left">
    <div id="well"><div id="bays"></div></div>
    <div id="nums"></div>
  </div>
  <div id="right">
    <div id="status"></div>
    <div id="footer">
      <div id="pwrbtn" aria-hidden="true">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M6 1v3.2" stroke="rgba(255,255,255,0.5)" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M3.8 2.9A4.3 4.3 0 1 0 8.2 2.9" stroke="rgba(255,255,255,0.5)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div id="infostrip">
        <div class="is-label" id="is-label"></div>
        <div class="is-sep"   id="is-sep1"></div>
        <div class="is-temp"  id="is-temp"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API       = '/api';
const params    = new URLSearchParams(location.search);
const id        = params.get('id') || '';
const size      = params.get('size') || 'small';
const BAY_COUNT = size === 'medium' ? 10 : 4;
const isMobile  = params.get('mobile') === '1';

const rootEl = document.getElementById('root');
rootEl.classList.remove('size-small','size-medium');
rootEl.classList.add(size === 'medium' ? 'size-medium' : 'size-small');

if (isMobile) {
  const s = document.createElement('style');
  s.textContent = `
    #root { padding:10px 8px 6px; }
    #bays { gap:4px; }
    #footer { padding-top:6px; }
    #pwrbtn { width:18px; height:18px; }
    .is-temp, .is-label { font-size:9px; }
  `;
  document.head.appendChild(s);
}

const COLOR = { green:'#2fd35a', yellow:'#ffcc00', red:'#ff3b30' };

function ledClass(s, hasSmart) {
  if (!hasSmart) return '';
  if (s === 2) return 'red';
  if (s === 1 || s === 3) return 'yellow';
  return 'green';
}
function statusText(s) {
  if (s === 0) return 'Healthy';
  if (s === 1) return 'Warning';
  if (s === 2) return 'Failed';
  if (s === 3) return 'Age Alert';
  return '';
}

function fmtCap(c){ if(!c||c<=0) return ''; if(c>=1e12){const t=c/1e12; return (t>=10?Math.round(t):t.toFixed(1))+' TB';} return Math.round(c/1e9)+' GB'; }
function shortName(d) {
  const n = (d.device_name || '').replace(/^\/dev\//, '');
  return n ? n.toUpperCase() : (d.device?.label || d.label || '');
}
function fullName(d) {
  return d.model_name || d.device?.label || shortName(d);
}
function deviceHref(d) {
  if (!_href || !d || !d.device_id) return _href || '';
  return _href.replace(/\/+$/, '') + '/web/device/' + encodeURIComponent(d.device_id);
}

let bayData   = new Array(BAY_COUNT).fill(null);
let _href     = '';
let bayEls    = [];
let stEls     = [];
let activeBay = -1;

const isLabel = document.getElementById('is-label');
const isTemp  = document.getElementById('is-temp');
const isSep1  = document.getElementById('is-sep1');

function showInfo(i) {
  const d = bayData[i];
  if (!d) return;
  const lbl  = fullName(d);
  const temp = d.temp != null ? d.temp + '°C' : '';
  isLabel.textContent  = lbl;
  isTemp.textContent   = temp;
  isSep1.style.display = (lbl && temp) ? '' : 'none';
  rootEl.classList.add('info-active');
}
function hideInfo() { rootEl.classList.remove('info-active'); }

function build() {
  const baysEl = document.getElementById('bays');
  const numsEl = document.getElementById('nums');
  const statusEl = document.getElementById('status');
  baysEl.innerHTML = ''; numsEl.innerHTML = ''; statusEl.innerHTML = '';
  bayEls = []; stEls = [];

  for (let i = 0; i < BAY_COUNT; i++) {
    const bay = document.createElement('div');
    bay.className = 'bay';
    bay.innerHTML = `<div class="bay-hole"></div><div class="bay-handle"></div>`;
    baysEl.appendChild(bay);
    bayEls.push(bay);

    const num = document.createElement('span');
    num.textContent = (i + 1);
    numsEl.appendChild(num);

    const st = document.createElement('div');
    st.className = 'st';
    st.innerHTML = `<b id="st-name-${i}"></b><i id="st-led-${i}"></i>`;
    statusEl.appendChild(st);
    stEls.push(st);

    addEvents(bay, i);
    addEvents(st, i);
  }
}

function update() {
  for (let i = 0; i < BAY_COUNT; i++) {
    const d    = bayData[i];
    const bay  = bayEls[i];
    const st   = stEls[i];
    const led  = document.getElementById(`st-led-${i}`);
    const name = document.getElementById(`st-name-${i}`);
    if (d) {
      bay.classList.add('assigned'); bay.classList.remove('empty');
      st.classList.add('assigned');
      bay.querySelector('.bay-hole').style.display = '';
      bay.querySelector('.bay-handle').style.display = '';
      const lc = ledClass(d.device_status ?? 0, d.hasSmart ?? false);
      led.className = lc || '';
      name.textContent = shortName(d);
      const cap = fmtCap(d.capacity);
      const stTxt = d.hasSmart ? statusText(d.device_status ?? 0) : 'No SMART data';
      const a11y = `Bay ${i+1}: ${shortName(d)}${cap ? ', '+cap : ''}${stTxt ? ', '+stTxt : ''}`;
      bay.setAttribute('role','button'); bay.setAttribute('tabindex','0'); bay.setAttribute('aria-label', a11y);
      st.setAttribute('role','button'); st.setAttribute('tabindex','0'); st.setAttribute('aria-label', a11y);
    } else {
      bay.classList.add('empty'); bay.classList.remove('assigned');
      st.classList.remove('assigned');
      bay.querySelector('.bay-hole').style.display = 'none';
      bay.querySelector('.bay-handle').style.display = 'none';
      led.className = '';
      name.textContent = 'DISK ' + (i + 1);
      bay.setAttribute('role','img'); bay.removeAttribute('tabindex'); bay.setAttribute('aria-label', `Bay ${i+1}: empty`);
      st.setAttribute('role','img'); st.removeAttribute('tabindex'); st.setAttribute('aria-label', `Bay ${i+1}: empty`);
    }
  }
}

function openBay(i) {
  const d = bayData[i]; if (!d) return;
  const u = deviceHref(d); if (u) window.open(u,'_blank','noopener,noreferrer');
}

function addEvents(elm, i) {
  const touch = () => 'ontouchstart' in window;
  elm.addEventListener('mouseenter', () => { if (!touch() && bayData[i]) { showInfo(i); linkPeer(i, true); } });
  elm.addEventListener('mouseleave', () => { if (!touch()) { hideInfo(); linkPeer(i, false); } });
  elm.addEventListener('click',      () => { if (!touch()) openBay(i); });
  elm.addEventListener('keydown', e => { if ((e.key==='Enter'||e.key===' ') && bayData[i]) { e.preventDefault(); openBay(i); } });
  let bsx=0, bsy=0, bmoved=false;
  elm.addEventListener('touchstart', e => { const t=e.touches[0]; if(t){ bsx=t.clientX; bsy=t.clientY; bmoved=false; } }, { passive:true });
  elm.addEventListener('touchmove',  e => { const t=e.touches[0]; if(t && (Math.abs(t.clientX-bsx)>8 || Math.abs(t.clientY-bsy)>8)) bmoved=true; }, { passive:true });
  elm.addEventListener('touchend', e => {
    if (bmoved) return;
    e.preventDefault();
    if (!bayData[i]) return;
    if (i === activeBay) {
      clearActiveVisual(); activeBay = -1; hideInfo();
      openBay(i);
    } else {
      clearActiveVisual();
      bayEls[i].classList.add('touch-active'); stEls[i].classList.add('touch-active');
      activeBay = i; showInfo(i);
      try { parent.postMessage({ type:'widget-active' }, '*'); } catch (_) {}
    }
  });
}

function linkPeer(i, on) {
  if (!bayData[i]) return;
  bayEls[i].classList.toggle('peer-hover', on);
  stEls[i].classList.toggle('peer-hover', on);
}
function clearActiveVisual() {
  bayEls.forEach(b => b.classList.remove('touch-active'));
  stEls.forEach(s => s.classList.remove('touch-active'));
}

document.addEventListener('touchend', e => {
  if (!e.target.closest('.bay') && !e.target.closest('.st')) {
    clearActiveVisual(); activeBay = -1; hideInfo();
  }
}, { passive:true });

window.__clearActive = () => { clearActiveVisual(); activeBay = -1; hideInfo(); };
window.addEventListener('message', e => { if (e.data && e.data.type === 'widget-clear') window.__clearActive(); }, false);

async function fetchData() {
  try {
    const r = await fetch(`${API}/widget-data/${encodeURIComponent(id)}?endpoint=disk-health`);
    if (!r.ok) return;
    const d = await r.json();
    if (!d || d.error || !d.bays) return;
    _href   = d.href || '';
    bayData = d.bays.map(b => b || null);
    while (bayData.length < BAY_COUNT) bayData.push(null);
    bayData = bayData.slice(0, BAY_COUNT);
    update();
  } catch {}
}

build();
update();
fetchData();
setInterval(fetchData, 60_000);
</script>
</body>
</html>
