<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disk Health</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  }

  #root { width:100%; height:100%; position:relative; }

  #shell {
    width:100%; height:100%;
    border-radius:20px;
    background:#3a3b3e;
    padding:7px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
  }
  #panel {
    width:100%; height:100%;
    border-radius:15px;
    background:#343539;
    padding:11px;
    display:flex; gap:9px;
    position:relative;
  }

  #left { flex:1; display:flex; flex-direction:column; min-width:0; }

  #bays {
    flex:1; min-height:0;
    display:flex; gap:3px;
    border-radius:6px; padding:3px;
    background:#0d0d0e;
    box-shadow:0 0 0 2px #0d0d0e;
  }
  #root.size-medium #bays { gap:2px; }

  .bay {
    flex:1 1 0; min-width:0;
    border-radius:4px;
    position:relative;
    overflow:hidden;
    background:#363739;
    cursor:default;
    display:flex;
    transform-origin:center;
    transition: transform 0.2s cubic-bezier(.34,1.2,.64,1), box-shadow 0.2s ease, background 0.2s ease;
  }
  .bay.empty { background:#262729; }
  .bay.assigned { cursor:pointer; }
  .bay.assigned:hover,
  .bay.assigned.touch-active {
    transform: scale(1.08);
    background:#404145;
    z-index:3;
    box-shadow: 0 6px 16px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
  }

  .bay-name {
    flex:1; min-height:0;
    display:flex; align-items:center; justify-content:center;
    writing-mode:vertical-rl; transform:rotate(180deg);
    font-size:clamp(8px,3.6vmin,11px); font-weight:600; letter-spacing:0.06em;
    color:rgba(255,255,255,0.4);
    white-space:nowrap; overflow:hidden; pointer-events:none;
  }
  #root.size-medium .bay-name { font-size:clamp(7px,2.4vmin,10px); letter-spacing:0.02em; }

  #nums { height:13px; flex-shrink:0; display:flex; align-items:center; padding:2px 4px 0; }
  #nums span { flex:1; text-align:center; font-size:clamp(6px,2vmin,8px); font-weight:500; color:rgba(255,255,255,0.28); }

  #right { width:24px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:7px; padding-top:1px; }
  #pwrbtn {
    width:18px; height:18px; border-radius:50%;
    background:#2a2b2d;
    display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    flex-shrink:0;
  }
  #usb {
    width:12px; height:18px; border-radius:3px;
    background:#0d0d0f; position:relative; flex-shrink:0;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }
  #usb::before {
    content:''; position:absolute; top:2px; bottom:2px; left:3px;
    width:3.5px; border-radius:2px; background:#2f8fe6;
  }
  #dots { margin-top:auto; display:flex; flex-direction:column; align-items:center; gap:11px; padding-bottom:2px; }
  #root.size-medium #dots { gap:5px; }
  #dots i { width:7px; height:7px; border-radius:50%; background:#3f4042; transition: background 0.2s; }
  #dots i.green { background:#22c55e; } #dots i.yellow { background:#ffcc00; } #dots i.red { background:#ff3b30; }

  #tip {
    position:absolute; z-index:20;
    background:rgba(20,20,22,0.96);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border-radius:8px; padding:7px 10px;
    box-shadow:0 6px 18px rgba(0,0,0,0.55), inset 0 0 0 0.5px rgba(255,255,255,0.1);
    display:flex; flex-direction:column; gap:3px;
    max-width:150px; pointer-events:none;
    opacity:0; transform:translateY(2px);
    transition: opacity 0.13s ease, transform 0.13s ease;
  }
  #root.tip-active #tip { opacity:1; transform:translateY(0); }
  #tip .t1 { display:flex; align-items:center; gap:6px; }
  #tip .t1 i { width:7px; height:7px; border-radius:50%; flex-shrink:0; background:#3f4042; }
  #tip .t1 i.green { background:#22c55e; } #tip .t1 i.yellow { background:#ffcc00; } #tip .t1 i.red { background:#ff3b30; }
  #tip .nm { font-size:12px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #tip .meta { font-size:11px; font-weight:500; color:rgba(255,255,255,0.62); white-space:nowrap; padding-left:13px; }

  @media (prefers-reduced-motion: reduce){
    .bay,#dots i,#tip{transition:none !important}
  }
</style>
</head>
<body>
<div id="root" class="size-small" role="group" aria-label="Disk health">
  <div id="shell"><div id="panel">
    <div id="left">
      <div id="bays"></div>
      <div id="nums"></div>
    </div>
    <div id="right">
      <div id="pwrbtn" aria-hidden="true">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M6 1v3.2" stroke="rgba(255,255,255,0.6)" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M3.8 2.9A4.3 4.3 0 1 0 8.2 2.9" stroke="rgba(255,255,255,0.6)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div id="usb" aria-hidden="true"></div>
      <div id="dots"></div>
    </div>
    <div id="tip" role="status" aria-live="polite">
      <div class="t1"><i id="tip-led"></i><span class="nm" id="tip-name"></span></div>
      <div class="meta" id="tip-meta"></div>
    </div>
  </div></div>
</div>

<script>
const API       = '/api';
const params    = new URLSearchParams(location.search);
const id        = params.get('id') || '';
const size      = params.get('size') || 'small';
const BAY_COUNT = size === 'medium' ? 10 : 4;
const isMobile  = params.get('mobile') === '1';

const rootEl = document.getElementById('root');
rootEl.classList.remove('size-small','size-medium');
rootEl.classList.add(size === 'medium' ? 'size-medium' : 'size-small');

if (isMobile) {
  const s = document.createElement('style');
  s.textContent = `#panel { padding:9px; } #right { width:22px; }`;
  document.head.appendChild(s);
}

function ledClass(s, hasSmart) {
  if (!hasSmart) return '';
  if (s === 2) return 'red';
  if (s === 1 || s === 3) return 'yellow';
  return 'green';
}
function statusText(s, hasSmart) {
  if (!hasSmart) return 'No SMART data';
  if (s === 0) return 'Healthy';
  if (s === 1) return 'Warning';
  if (s === 2) return 'Failed';
  if (s === 3) return 'Age Alert';
  return '';
}
function fmtCap(c){ if(!c||c<=0) return ''; if(c>=1e12){const t=c/1e12; return (t>=10?Math.round(t):t.toFixed(1))+' TB';} return Math.round(c/1e9)+' GB'; }
function shortName(d) {
  const n = (d.device_name || '').replace(/^\/dev\//, '');
  return n ? n.toUpperCase() : (d.device?.label || d.label || '');
}
function fullName(d) { return d.model_name || d.device?.label || shortName(d); }
function deviceHref(d) {
  if (!_href || !d || !d.device_id) return _href || '';
  return _href.replace(/\/+$/, '') + '/web/device/' + encodeURIComponent(d.device_id);
}

let bayData   = new Array(BAY_COUNT).fill(null);
let _href     = '';
let bayEls    = [];
let activeBay = -1;

const tipEl   = document.getElementById('tip');
const tipLed  = document.getElementById('tip-led');
const tipName = document.getElementById('tip-name');
const tipMeta = document.getElementById('tip-meta');

function showTip(i) {
  const d = bayData[i];
  if (!d) return;
  const lc = ledClass(d.device_status ?? 0, d.hasSmart ?? false);
  tipLed.className = lc || '';
  tipName.textContent = fullName(d);
  const parts = [];
  const cap = fmtCap(d.capacity);
  if (cap) parts.push(cap);
  parts.push(statusText(d.device_status ?? 0, d.hasSmart ?? false));
  if (d.temp != null) parts.push(d.temp + '°C');
  tipMeta.textContent = parts.filter(Boolean).join(' · ');
  rootEl.classList.add('tip-active');
  positionTip(i);
}
function hideTip() { rootEl.classList.remove('tip-active'); }

function positionTip(i) {
  const bay = bayEls[i];
  const rootRect = rootEl.getBoundingClientRect();
  const bayRect  = bay.getBoundingClientRect();
  tipEl.style.left = '0px'; tipEl.style.top = '0px';
  const tw = tipEl.offsetWidth, th = tipEl.offsetHeight;
  const bayCx = (bayRect.left - rootRect.left) + bayRect.width / 2;
  let left = bayCx - tw / 2;
  left = Math.max(4, Math.min(left, rootRect.width - tw - 4));
  let top = (bayRect.top - rootRect.top) - th - 6;
  if (top < 4) top = (bayRect.bottom - rootRect.top) + 6;
  if (top + th > rootRect.height - 4) top = rootRect.height - th - 8;
  top = Math.max(4, top);
  tipEl.style.left = Math.round(left) + 'px';
  tipEl.style.top  = Math.round(top) + 'px';
}

function build() {
  const baysEl = document.getElementById('bays');
  const numsEl = document.getElementById('nums');
  const dotsEl = document.getElementById('dots');
  baysEl.innerHTML = ''; numsEl.innerHTML = ''; dotsEl.innerHTML = '';
  bayEls = [];
  for (let i = 0; i < BAY_COUNT; i++) {
    const bay = document.createElement('div');
    bay.className = 'bay';
    bay.innerHTML = `<div class="bay-name" id="nm-${i}"></div>`;
    baysEl.appendChild(bay);
    bayEls.push(bay);

    const num = document.createElement('span');
    num.textContent = (i + 1);
    numsEl.appendChild(num);

    const dot = document.createElement('i');
    dot.id = `dot-${i}`;
    dotsEl.appendChild(dot);

    addEvents(bay, i);
  }
}

function update() {
  for (let i = 0; i < BAY_COUNT; i++) {
    const d   = bayData[i];
    const bay = bayEls[i];
    const nm  = document.getElementById(`nm-${i}`);
    const dot = document.getElementById(`dot-${i}`);
    if (d) {
      bay.classList.add('assigned'); bay.classList.remove('empty');
      const lc = ledClass(d.device_status ?? 0, d.hasSmart ?? false);
      dot.className = lc || '';
      nm.textContent = shortName(d);
      const cap = fmtCap(d.capacity);
      const st  = statusText(d.device_status ?? 0, d.hasSmart ?? false);
      bay.setAttribute('role','button'); bay.setAttribute('tabindex','0');
      bay.setAttribute('aria-label', `Bay ${i+1}: ${shortName(d)}${cap ? ', '+cap : ''}${st ? ', '+st : ''}`);
    } else {
      bay.classList.add('empty'); bay.classList.remove('assigned');
      dot.className = '';
      nm.textContent = '';
      bay.setAttribute('role','img'); bay.removeAttribute('tabindex');
      bay.setAttribute('aria-label', `Bay ${i+1}: empty`);
    }
  }
}

function openBay(i) {
  const d = bayData[i]; if (!d) return;
  const u = deviceHref(d); if (u) window.open(u,'_blank','noopener,noreferrer');
}

function addEvents(bay, i) {
  const touch = () => 'ontouchstart' in window;
  bay.addEventListener('mouseenter', () => { if (!touch() && bayData[i]) showTip(i); });
  bay.addEventListener('mouseleave', () => { if (!touch()) hideTip(); });
  bay.addEventListener('click',      () => { if (!touch()) openBay(i); });
  bay.addEventListener('keydown', e => { if ((e.key==='Enter'||e.key===' ') && bayData[i]) { e.preventDefault(); openBay(i); } });
  bay.addEventListener('focus', () => { if (bayData[i]) showTip(i); });
  bay.addEventListener('blur',  () => hideTip());
  let bsx=0, bsy=0, bmoved=false;
  bay.addEventListener('touchstart', e => { const t=e.touches[0]; if(t){ bsx=t.clientX; bsy=t.clientY; bmoved=false; } }, { passive:true });
  bay.addEventListener('touchmove',  e => { const t=e.touches[0]; if(t && (Math.abs(t.clientX-bsx)>8 || Math.abs(t.clientY-bsy)>8)) bmoved=true; }, { passive:true });
  bay.addEventListener('touchend', e => {
    if (bmoved) return;
    e.preventDefault();
    if (!bayData[i]) return;
    if (i === activeBay) {
      bay.classList.remove('touch-active'); activeBay = -1; hideTip();
      openBay(i);
    } else {
      bayEls.forEach((b,j) => { if (j!==i) b.classList.remove('touch-active'); });
      bay.classList.add('touch-active'); activeBay = i; showTip(i);
      try { parent.postMessage({ type:'widget-active' }, '*'); } catch (_) {}
    }
  });
}

document.addEventListener('touchend', e => {
  if (!e.target.closest('.bay')) {
    bayEls.forEach(b => b.classList.remove('touch-active'));
    activeBay = -1; hideTip();
  }
}, { passive:true });

window.__clearActive = () => { bayEls.forEach(b => b.classList.remove('touch-active')); activeBay = -1; hideTip(); };
window.addEventListener('message', e => { if (e.data && e.data.type === 'widget-clear') window.__clearActive(); }, false);

async function fetchData() {
  try {
    const r = await fetch(`${API}/widget-data/${encodeURIComponent(id)}?endpoint=disk-health`);
    if (!r.ok) return;
    const d = await r.json();
    if (!d || d.error || !d.bays) return;
    _href   = d.href || '';
    bayData = d.bays.map(b => b || null);
    while (bayData.length < BAY_COUNT) bayData.push(null);
    bayData = bayData.slice(0, BAY_COUNT);
    update();
  } catch {}
}

build();
update();
fetchData();
setInterval(fetchData, 60_000);
</script>
</body>
</html>
