/* ---- icon assembly from embedded artwork ---- */
function sym(name){
  const e=EL[name];
  const inner=e.paths.map(([f,o,d])=>`<path fill="${f}" opacity="${o}" d="${d}"/>`).join('');
  return {g:`<g transform="translate(${-e.x0},${-e.y0})">${inner}</g>`,w:e.w,h:e.h};
}
function place(name,W,px,py){
  const s=sym(name);const sc=W/s.w;
  return `<g transform="translate(${px},${py}) scale(${sc})">${s.g}</g>`;
}
function placeIndividual(name,W,px,py,cls){
  const e=EL[name];const sc=W/e.w;
  const parts=e.paths.map(([f,o,d],i)=>`<g class="${cls}" style="--i:${i}"><path fill="${f}" opacity="${o}" transform="translate(${-e.x0},${-e.y0})" d="${d}"/></g>`).join('');
  return `<g transform="translate(${px},${py}) scale(${sc})">${parts}</g>`;
}
/* Cloud with an overridden fill/opacity — used for the lighter back cloud so it
   reads bigger and whiter behind the front cloud. */
function placeCloud(W,px,py,fill,op){
  const e=EL.cloud;const sc=W/e.w;
  const inner=e.paths.map(([f,o,d])=>{
    /* only recolor the two main translucent body layers; keep highlight bits */
    const isBody = (f==='#a2a2a2'||f==='#bebebe');
    return `<path fill="${isBody?fill:f}" opacity="${isBody?op:o}" d="${d}"/>`;
  }).join('');
  return `<g transform="translate(${px},${py}) scale(${sc})"><g transform="translate(${-e.x0},${-e.y0})">${inner}</g></g>`;
}
function mistSVG(day){
  const c=day?'#a2a2a2':'#bcbcbc';
  const rows=[[10,28,86],[8,42,80],[14,56,90],[10,70,84]];
  return rows.map((r,i)=>`<line class="wx-mist" style="--i:${i}" x1="${r[0]}" y1="${r[1]}" x2="${r[2]}" y2="${r[1]}" stroke="${c}" stroke-width="6" stroke-linecap="round" opacity="0.7"/>`).join('');
}
const CLIP='<defs><clipPath id="below"><rect x="0" y="40" width="100" height="60"/></clipPath></defs>';

function buildIcon(cond,day){
  const orb=day?'sun':'moon';
  const CW=92,SUNW=70;
  switch(cond){
    case 'clear':     return place(orb,76,22,14);
    case 'few':       return place(orb,SUNW,46,2)+place('cloud',CW,6,22);
    case 'scattered': return place('cloud',96,12,22);
    case 'broken':    return placeCloud(86,30,0,'#f0f0f0',0.96)+place('cloud',82,4,24);
    case 'shower':    return CLIP+`<g clip-path="url(#below)">${placeIndividual('rain',56,22,44,'wx-drop')}</g>`+place('cloud',CW,8,4);
    case 'rain':      return CLIP+place(orb,SUNW,48,0)+`<g clip-path="url(#below)">${placeIndividual('rain',54,20,46,'wx-drop')}</g>`+place('cloud',CW,8,14);
    case 'thunder':   return place('cloud',CW,8,4)+`<g class="wx-bolt">${place('bolt',34,42,44)}</g>`;
    case 'snow':      return CLIP+place(orb,SUNW,48,0)+`<g clip-path="url(#below)">${placeIndividual('snow',62,16,46,'wx-flake')}</g>`+place('cloud',CW,8,12);
    case 'mist':      return mistSVG(day);
  }
  return place('cloud',96,12,22);
}

/* WMO weather code -> {cond, label} */
function mapCode(code){
  if(code===0) return {cond:'clear',label:'Clear'};
  if(code===1) return {cond:'few',label:'Mostly Clear'};
  if(code===2) return {cond:'scattered',label:'Partly Cloudy'};
  if(code===3) return {cond:'broken',label:'Cloudy'};
  if(code===45||code===48) return {cond:'mist',label:'Fog'};
  if(code>=51&&code<=57) return {cond:'shower',label:'Drizzle'};
  if(code>=61&&code<=67) return {cond:'rain',label:'Rain'};
  if(code>=80&&code<=82) return {cond:'shower',label:'Showers'};
  if(code>=71&&code<=77) return {cond:'snow',label:'Snow'};
  if(code>=85&&code<=86) return {cond:'snow',label:'Snow Showers'};
  if(code>=95) return {cond:'thunder',label:'Thunderstorm'};
  return {cond:'broken',label:'Cloudy'};
}

/* temperature -> color, warm(amber)->cold(blue). Works in C or F by converting to C. */
function tempColor(temp,units){
  const c = units==='f' ? (temp-32)*5/9 : temp;
  /* Map -5..35C onto a hue sweep cold->warm. Interpolating hue (not RGB) keeps
     mid temperatures clean (teal/green/amber) instead of muddy brown. */
  const t=Math.max(0,Math.min(1,(c+5)/40));
  const hue = 210 - 210*t;        /* 210 (blue) -> 0 (red/orange) */
  const sat = 70;                  /* vivid but not neon */
  const light = 52;                /* readable on both light and dark cards */
  return `hsl(${Math.round(hue)},${sat}%,${light}%)`;
}

function render(d){
  const m=mapCode(d.code);
  const day=d.isDay!==false;
  /* The widget paints its OWN background based on the weather region's day/night,
     not the dashboard theme: light card by day, dark card by night. */
  const bg = day ? '#ffffff' : '#242424';
  document.body.style.background = bg;
  widgetEl.style.background = bg;

  icoEl.innerHTML=buildIcon(m.cond,day);
  condEl.textContent=m.label;
  const unitSym = d.units==='f' ? '°F' : '°C';
  tempEl.innerHTML=d.temp+'&deg;';
  /* set colors directly on the elements so nothing can override them */
  tempEl.style.color=tempColor(d.temp,d.units);
  condEl.style.color = day ? '#333333' : '#e7e7e7';

  /* HIG: full detail available on hover + to screen readers */
  const loc = d.city || 'Current location';
  const tempDesc = `${d.temp}${unitSym}${d.usedFeels?' (feels like)':''}`;
  const summary = `${loc} — ${m.label}, ${tempDesc}`;
  widgetEl.setAttribute('title', summary);
  widgetEl.setAttribute('aria-label', summary);
  srEl.textContent = summary;
}

function setMsg(t){msgEl.textContent=t;msgEl.style.display='';icoEl.style.visibility='hidden';condEl.style.visibility='hidden';tempEl.style.visibility='hidden';}
function clearMsg(){msgEl.style.display='none';icoEl.style.visibility='';condEl.style.visibility='';tempEl.style.visibility='';}

async function boot(){
  let cfg=null;
  try{const r=await fetch(`${API}/widget-config/${encodeURIComponent(id)}`);if(r.ok)cfg=await r.json();}catch(e){}
  const href=cfg&&cfg.widgetConfig&&cfg.widgetConfig.href;
  if(href){widgetEl.classList.add('clickable');widgetEl.addEventListener('click',()=>window.open(href,'_blank','noopener,noreferrer'));}
  tick();setInterval(tick,TICK_MS);
}
let _last=null;
async function tick(){
  try{
    const r=await fetch(`${API}/widget-data/${encodeURIComponent(id)}?endpoint=weather`);
    if(!r.ok){const d=await r.json().catch(()=>({}));setMsg(d.error||('Error '+r.status));return;}
    const d=await r.json();
    if(d&&d.error){setMsg(d.error);return;}
    clearMsg();_last=d;render(d);
  }catch(e){setMsg('Unavailable');}
}
boot();
</script>
