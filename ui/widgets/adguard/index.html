<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdGuard Stats</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1c1c1e;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }

  .widget { width: 100%; height: 100%; display: flex; flex-direction: column;
    padding: 12px 14px 12px 16px; container-type: inline-size;
    justify-content: space-evenly; }
  .widget.size-medium { flex-direction: row; }

  .col-left  { display: flex; flex-direction: column; justify-content: space-evenly;
    width: 46%; padding-right: 10px;
    border-right: 1px solid rgba(255,255,255,0.08);
    min-width: 0; overflow: hidden; }
  .col-right { display: flex; flex-direction: column; justify-content: flex-end;
    flex: 1; padding-left: 12px; min-width: 0; overflow: hidden; height: 100%; }

  /* Stat rows */
  .val-row  { display: flex; align-items: center; gap: 7px; flex: 1; min-height: 0;
    border-radius: 6px; transition: opacity .15s; }
  .val-row.clickable { cursor: pointer; }
  .val-row.clickable:active { opacity: .65; }
  .val-icon { flex-shrink: 0; display: flex; align-items: center; }
  .val-num  { font-size: clamp(13px, 4.8cqw, 22px); font-weight: 700;
    letter-spacing: -0.02em; line-height: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .c-filter  { color: #ff3b30; }
  .c-malware { color: #ffd60a; }
  .c-parental{ color: #0a84ff; }
  .c-total   { color: rgba(255,255,255,0.40); }

  .slot-row { display: flex; align-items: center; gap: 7px; flex: 1; min-height: 0;
    border-radius: 6px; transition: opacity .15s; }
  .slot-row.clickable { cursor: pointer; }
  .slot-row.clickable:active { opacity: .65; }

  /* Chart */
  .chart-wrap { width: 100%; flex: 1; min-height: 0;
    position: relative; overflow: visible;
    cursor: crosshair; }
  .chart-wrap.clickable { cursor: pointer; }
  .chart-wrap svg { position: absolute; inset: 0; width: 100%; height: 100%;
    overflow: visible; }

  .scrubber { position: absolute; top: 0; bottom: 0; width: 1px;
    background: rgba(255,255,255,0.20); pointer-events: none;
    opacity: 0; transition: opacity .1s; }
  .scrubber.on { opacity: 1; }

  /* Compact tooltip — never overlaps chart significantly */
  .chart-tip {
    position: absolute; top: 2px; pointer-events: none;
    background: rgba(36,36,40,0.88);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 8px; padding: 5px 8px 5px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    font-size: 11px; line-height: 1.5;
    color: rgba(255,255,255,0.82);
    opacity: 0; transition: opacity .1s; z-index: 10;
    white-space: nowrap;
  }
  .chart-tip.on { opacity: 1; }
  .tip-time { font-size: 10px; color: rgba(255,255,255,0.36);
    font-weight: 500; margin-bottom: 3px; }
  .tip-row  { display: flex; align-items: center; gap: 6px; }
  .tip-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .tip-val  { font-weight: 650; }

  .chart-msg { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 11px; color: rgba(255,255,255,0.28);
    text-align: center; padding: 4px; }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>
<p id="ag-sr" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);margin:-1px;"></p>
<div class="widget" id="widget" aria-hidden="true"></div>
<script>
const TICK_MS = 30000;
const id   = new URLSearchParams(location.search).get('id')   || '';
const size = new URLSearchParams(location.search).get('size') || 'medium';
const API  = '/api';
const UID  = id.replace(/[^a-z0-9]/gi,'') || 'ag';

let cfg      = null;
let _href    = '';
let _series  = null;
let _dataLen = 0;
let _chartW  = 0;
let _scrubActive = false; /* true while mouse is moving over chart */

const STAT_KEYS = ['filter','malware','parental','total'];

const STAT_META = {
  filter:  { label:'Blocked',  title:'Blocked by filter',     lineColor:'rgba(255,59,48,0.90)',   fillOpacity:0.26, lineWidth:1.5 },
  malware: { label:'Malware',  title:'Blocked malware',       lineColor:'rgba(255,214,10,0.90)',  fillOpacity:0.26, lineWidth:1.5 },
  parental:{ label:'Parental', title:'Parental blocks',       lineColor:'rgba(10,132,255,0.90)', fillOpacity:0.26, lineWidth:1.5 },
  total:   { label:'Total',    title:'Total DNS queries',     lineColor:'rgba(180,180,190,0.85)', fillOpacity:0.16, lineWidth:1.2 },
};

/* Chart series order: blocked first, then malware, parental, total last (underneath) */
const CHART_ORDER = ['total','filter','malware','parental'];


/* Left column icons */
const ICONS_SVG_16 = {
  filter:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <path d="M8 1.8L2.2 4.2V8c0 3.2 2.5 6.1 5.8 6.8 3.3-.7 5.8-3.6 5.8-6.8V4.2L8 1.8z" fill="#ff3b30"/>
    <path d="M5.5 8.2l1.7 1.7 3.3-3.4" stroke="#fff" stroke-width="1.35"
      stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  malware:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <path d="M8 2L1.5 13.5h13L8 2z" fill="#ffd60a" opacity=".15"
      stroke="#ffd60a" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M8 6v3.5" stroke="#ffd60a" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="8" cy="11.5" r=".75" fill="#ffd60a"/></svg>`,
  parental:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <path d="M6 2.8a1.2 1.2 0 0 1 2.4 0V7H6V2.8z" fill="#0a84ff"/>
    <path d="M8.4 4.6A1.1 1.1 0 0 1 10.6 4.6V7H8.4V4.6z" fill="#0a84ff"/>
    <path d="M10.6 5.6a1 1 0 0 1 2 0V9C12.6 11.8 11 13.4 8 13.4
      S3.4 11.8 3.4 9V7.6a1 1 0 0 1 2 0" fill="#0a84ff"/></svg>`,
  total:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="8" r="5.8" stroke="rgba(255,255,255,0.40)" stroke-width="1.2"/>
    <path d="M8 2.2C6.6 4 5.8 6 5.8 8s.8 4 2.2 5.8M8 2.2C9.4 4 10.2 6 10.2 8s-.8 4-2.2 5.8"
      stroke="rgba(255,255,255,0.40)" stroke-width="1.0"/>
    <path d="M2.5 8h11M3 5.5h10M3 10.5h10"
      stroke="rgba(255,255,255,0.40)" stroke-width="1.0" opacity="0.7"/></svg>`,
};

/* ── Boot ── */
async function boot() {
  try {
    const r = await fetch(`${API}/widget-config/${encodeURIComponent(id)}`);
    if (r.ok) cfg = await r.json();
  } catch {}
  if (!cfg) cfg = { widgetConfig:{} };
  _href = cfg.widgetConfig?.adguardHref || '';
  buildShell();
  await tick();
  setInterval(tick, TICK_MS);
}

function openHref() {
  if (_href) window.open(_href, '_blank', 'noopener,noreferrer');
}

/* ── Shell (runs once — no click handlers added in apply()) ── */
function buildShell() {
  const w = document.getElementById('widget');
  w.className = 'widget' + (size==='medium' ? ' size-medium' : '');

  if (size === 'medium') {
    const left  = document.createElement('div'); left.className = 'col-left';
    const right = document.createElement('div'); right.className = 'col-right';

    /* Stat rows — click wired once here, never again */
    STAT_KEYS.forEach(key => {
      const meta = STAT_META[key];
      const row  = document.createElement('div');
      row.className = 'val-row' + (_href ? ' clickable' : '');
      row.title = meta.title; /* hover tooltip on left column items */

      const ic  = document.createElement('span'); ic.className = 'val-icon';
      ic.innerHTML = ICONS_SVG_16[key];
      const num = document.createElement('div');
      num.className = `val-num c-${key}`; num.id = `num-${key}`; num.textContent = '—';

      row.append(ic, num);
      if (_href) row.addEventListener('click', openHref);
      left.appendChild(row);
    });

    /* Chart */
    const cw    = document.createElement('div');
    cw.className = 'chart-wrap' + (_href ? ' clickable' : '');
    cw.id = 'chart-wrap';

    const scrub = document.createElement('div'); scrub.className = 'scrubber'; scrub.id = 'scrubber';
    const tip   = document.createElement('div'); tip.className   = 'chart-tip'; tip.id = 'chart-tip';
    const cm    = document.createElement('div'); cm.className    = 'chart-msg'; cm.id = 'chart-msg';
    cm.textContent = 'Loading…';
    cw.append(scrub, tip, cm);

    /* Scrubber events */
    cw.addEventListener('mousemove',  e  => { _scrubActive = true;  showScrub(e.clientX); });
    cw.addEventListener('touchmove',  e  => { if(e.touches[0]) showScrub(e.touches[0].clientX); }, {passive:true});
    cw.addEventListener('mouseleave', hideScrub);
    cw.addEventListener('touchend',   hideScrub);

    /* Chart click — only navigate when NOT actively scrubbing */
    if (_href) {
      cw.addEventListener('click', () => {
        if (!_scrubActive) openHref();
        _scrubActive = false;
      });
    }

    right.appendChild(cw);
    w.append(left, right);

  } else {
    STAT_KEYS.forEach(key => {
      const meta = STAT_META[key];
      const row  = document.createElement('div');
      row.className = 'slot-row' + (_href ? ' clickable' : '');
      row.title = meta.title;

      const ic  = document.createElement('span'); ic.className = 'val-icon';
      ic.innerHTML = ICONS_SVG_16[key];
      const num = document.createElement('div');
      num.className = `val-num c-${key}`; num.id = `num-${key}`; num.textContent = '—';

      row.append(ic, num);
      if (_href) row.addEventListener('click', openHref);
      w.appendChild(row);
    });
  }
}

/* ── Fetch ── */
async function tick() {
  try {
    const r = await fetch(`${API}/widget-data/${encodeURIComponent(id)}?endpoint=stats`);
    if (!r.ok) {
      const d = await r.json().catch(()=>({}));
      setError(r.status===503?'Not configured':r.status===401?'Auth error':
               r.status===502?'Unreachable':d.error||('Error '+r.status));
      return;
    }
    apply(await r.json());
  } catch { setError('Unreachable'); }
}

function fmt(n) {
  if (n==null||isNaN(n)) return '—';
  if (n>=1_000_000) return (n/1_000_000).toFixed(2).replace(/\.?0+$/,'')+'M';
  return n.toLocaleString();
}

/* Smart time label — data is always 1 point per hour */
function timeLabel(idx) {
  const hoursAgo = _dataLen - 1 - idx;
  if (hoursAgo === 0) return 'Now';
  if (hoursAgo < 24)  return hoursAgo === 1 ? '1h ago' : `${hoursAgo}h ago`;
  const now  = new Date();
  const then = new Date(now.getTime() - hoursAgo * 3_600_000);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const hh   = String(then.getHours()).padStart(2,'0');
  if (hoursAgo >= 144) {
    const mm = String(then.getMonth()+1).padStart(2,'0');
    const dd = String(then.getDate()).padStart(2,'0');
    return `${mm}/${dd} ${hh}:00`;
  }
  return `${days[then.getDay()]} ${hh}:00`;
}

/* ── Apply — only updates numbers, never touches click handlers ── */
function apply(d) {
  const set = (key,v) => { const el=document.getElementById(`num-${key}`); if(el) el.textContent=fmt(v); };
  set('filter',  d.num_blocked_filtering);
  set('malware', d.num_replaced_safebrowsing);
  set('parental',d.num_replaced_parental);
  set('total',   d.num_dns_queries);

  const sr = document.getElementById('ag-sr');
  if (sr) sr.textContent = `AdGuard: ${fmt(d.num_blocked_filtering)} blocked, ${fmt(d.num_replaced_safebrowsing)} malware, ${fmt(d.num_replaced_parental)} parental, ${fmt(d.num_dns_queries)} total queries`;

  if (size !== 'medium') return;

  const cw = document.getElementById('chart-wrap'); if (!cw) return;
  const cm = document.getElementById('chart-msg');  if (cm) cm.remove();

  const raw = {
    total:   d.dns_queries           || [],
    filter:  d.blocked_filtering     || [],
    malware: d.replaced_safebrowsing || [],
    parental:d.replaced_parental     || [],
  };

  /* Draw total first (back), then blocked series on top */
  const series = CHART_ORDER
    .map(key => ({ key, ...STAT_META[key], data: raw[key] }))
    .filter(s => s.key === 'total' || s.data.some(v=>v>0));

  _series  = series;
  _dataLen = raw.total.length;

  drawChart(cw, series);
}

/* ── SVG chart ── */
function drawChart(cw, series) {
  const old = cw.querySelector('svg'); if(old) old.remove();
  const W = cw.offsetWidth||200, H = cw.offsetHeight||100;
  _chartW = W;
  if (!W||!H||!series.length) return;

  const allVals = series.flatMap(s=>s.data);
  const dataMax = Math.max(...allVals,1);
  const yMax    = dataMax*1.20;
  const len     = series[0].data.length;
  if (len<2) return;

  const xOf = i => (i/(len-1))*W;
  const yOf = v => H-(v/yMax)*H;

  const NS  = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio','none');
  const defs = document.createElementNS(NS,'defs'); svg.appendChild(defs);

  series.forEach((s,si) => {
    const gid = `${UID}_g${si}`;
    const pts = s.data.map((v,i)=>[xOf(i),yOf(v)]);
    const lp  = smoothPath(pts);
    const ap  = lp+` L${xOf(len-1)},${H} L${xOf(0)},${H} Z`;

    const grad=document.createElementNS(NS,'linearGradient');
    grad.setAttribute('id',gid); grad.setAttribute('x1','0'); grad.setAttribute('y1','0');
    grad.setAttribute('x2','0'); grad.setAttribute('y2','1');
    const g0=document.createElementNS(NS,'stop');
    g0.setAttribute('offset','0%'); g0.setAttribute('stop-color',s.lineColor);
    g0.setAttribute('stop-opacity',String(s.fillOpacity));
    const g1=document.createElementNS(NS,'stop');
    g1.setAttribute('offset','100%'); g1.setAttribute('stop-color',s.lineColor);
    g1.setAttribute('stop-opacity','0');
    grad.append(g0,g1); defs.appendChild(grad);

    const fill=document.createElementNS(NS,'path');
    fill.setAttribute('d',ap); fill.setAttribute('fill',`url(#${gid})`);
    svg.appendChild(fill);

    const line=document.createElementNS(NS,'path');
    line.setAttribute('d',lp); line.setAttribute('fill','none');
    line.setAttribute('stroke',s.lineColor);
    line.setAttribute('stroke-width',String(s.lineWidth));
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('stroke-linejoin','round');
    svg.appendChild(line);
  });

  cw.appendChild(svg);
}

function smoothPath(pts) {
  const t=0.35;
  let d=`M${r(pts[0][0])},${r(pts[0][1])}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||pts[i+1];
    const cp1x=p1[0]+(p2[0]-p0[0])*t, cp1y=p1[1]+(p2[1]-p0[1])*t;
    const cp2x=p2[0]-(p3[0]-p1[0])*t, cp2y=p2[1]-(p3[1]-p1[1])*t;
    d+=` C${r(cp1x)},${r(cp1y)} ${r(cp2x)},${r(cp2y)} ${r(p2[0])},${r(p2[1])}`;
  }
  return d;
}
function r(n){return Math.round(n*100)/100;}

/* ── Scrubber + compact tooltip ── */
function clientToIdx(clientX) {
  const cw=document.getElementById('chart-wrap'); if(!cw||!_dataLen) return -1;
  const rect=cw.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
  return Math.round(pct*(_dataLen-1));
}

function showScrub(clientX) {
  if(!_series||!_dataLen) return;
  const cw=document.getElementById('chart-wrap'); if(!cw) return;
  const scrub=document.getElementById('scrubber');
  const tip=document.getElementById('chart-tip');
  if(!scrub||!tip) return;

  const idx = clientToIdx(clientX);
  if(idx<0) return;

  const xpx = (idx/(_dataLen-1))*_chartW;
  scrub.style.left = xpx+'px';
  scrub.classList.add('on');

  /* Build tooltip — icon + value, skip if value is 0, order: filter/malware/parental/total */
  tip.innerHTML='';

  const ttime=document.createElement('div'); ttime.className='tip-time';
  ttime.textContent=timeLabel(idx); tip.appendChild(ttime);

  /* Tooltip series order: blocked types first, total last */
  const tipOrder = ['filter','malware','parental','total'];
  tipOrder.forEach(key => {
    const s = _series.find(s=>s.key===key); if(!s) return;
    const v = s.data[idx]??0;
    if (v === 0 && key !== 'total') return; /* skip zero non-total rows */
    const row=document.createElement('div'); row.className='tip-row';
    const dot=document.createElement('div'); dot.className='tip-dot';
    dot.style.background=s.lineColor;
    const val=document.createElement('span'); val.className='tip-val';
    val.textContent=fmt(v);
    row.append(dot,val); tip.appendChild(row);
  });

  tip.classList.add('on');

  /* Position: pin to top, beside scrubber, never overflow right edge */
  const tipW = tip.offsetWidth||80;
  const cwW  = cw.offsetWidth||_chartW;
  const pad  = 4;
  /* Default: right of scrubber */
  let tx = xpx + 10;
  /* Flip to left if it would overflow */
  if (tx + tipW + pad > cwW) tx = xpx - tipW - 10;
  /* Final clamp */
  tx = Math.max(pad, Math.min(cwW - tipW - pad, tx));
  tip.style.left = tx+'px';
  tip.style.top  = '2px';
}

function hideScrub() {
  _scrubActive = false;
  document.getElementById('scrubber')?.classList.remove('on');
  document.getElementById('chart-tip')?.classList.remove('on');
}

/* ── Error ── */
function setError(msg) {
  STAT_KEYS.forEach(k=>{const el=document.getElementById(`num-${k}`);if(el) el.textContent='—';});
  const cw=document.getElementById('chart-wrap'); if(!cw) return;
  const old=cw.querySelector('svg'); if(old) old.remove();
  let m=document.getElementById('chart-msg');
  if(!m){m=document.createElement('div');m.className='chart-msg';m.id='chart-msg';cw.appendChild(m);}
  m.textContent=msg;
}

boot();
</script>
</body>
</html>
