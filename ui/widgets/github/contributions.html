<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GitHub Contributions</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;
    background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;}
  .widget{width:100%;height:100%;display:flex;align-items:center;
    justify-content:center;padding:8px;cursor:default;}
  .widget.clickable{cursor:pointer;}
  .graph{display:flex;flex-direction:row;gap:2px;align-items:flex-start;}
  .col{display:flex;flex-direction:column;gap:2px;}
  .cell{border-radius:2px;flex-shrink:0;transition:opacity .1s;}
  .cell:hover{opacity:.75;}
  .l0{background:rgba(255,255,255,0.07);}
  .l1{background:#0e4429;}
  .l2{background:#006d32;}
  .l3{background:#26a641;}
  .l4{background:#39d353;}
  .msg{font-size:11px;color:rgba(255,255,255,0.3);text-align:center;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;animation:none !important} }
</style>
</head>
<body>
<div class="widget" id="widget">
  <div class="msg" id="msg">Loading…</div>
</div>
<script>
const TICK_MS = 300000;
const id      = new URLSearchParams(location.search).get('id')      || '';
const size    = new URLSearchParams(location.search).get('size')    || 'small';
const compact = new URLSearchParams(location.search).get('compact') === '1';
const IW      = parseInt(new URLSearchParams(location.search).get('iw') || '0', 10);
const IH      = parseInt(new URLSearchParams(location.search).get('ih') || '0', 10);
const API  = '/api';

/* Small: 7×7. Medium: 16×7 (one more column than before) */
const COLS = size === 'medium' ? 16 : 7;
const ROWS = 7;

let _href = '';

async function boot() {
  try {
    const r = await fetch(`${API}/widget-config/${encodeURIComponent(id)}`);
    if (r.ok) {
      const cfg = await r.json();
      _href = cfg.widgetConfig?.githubHref || '';
    }
  } catch {}
  const w = document.getElementById('widget');
  if (_href) {
    w.classList.add('clickable');
    w.addEventListener('click', () => window.open(_href,'_blank','noopener,noreferrer'));
  }
  await tick();
  setInterval(tick, TICK_MS);
}

async function tick() {
  try {
    const r = await fetch(`${API}/widget-data/${encodeURIComponent(id)}?endpoint=data`);
    if (!r.ok) {
      const d = await r.json().catch(()=>({}));
      showMsg(r.status===503?'Not configured':r.status===401?'Bad token':d.error||('Error '+r.status));
      return;
    }
    const d = await r.json();
    if (d && d.error) { showMsg(d.error); return; }
    render(d);
  } catch { showMsg('Unreachable'); }
}

function render(data) {
  const weeks  = (data.weeks || []).slice(-COLS);
  const widget = document.getElementById('widget');
  const msg    = document.getElementById('msg');
  if (msg) msg.remove();
  const old = widget.querySelector('.graph');
  if (old) old.remove();

  /* Wait for layout to settle before measuring — critical inside iframes on iOS */
  requestAnimationFrame(() => _renderGraph(data, weeks, widget));
}

function _renderGraph(data, weeks, widget) {

  /* Quartile-based levels relative to max in visible window */
  let maxCount = 0;
  weeks.forEach(w => (w.contributionDays||[]).forEach(d => {
    if ((d.contributionCount||0) > maxCount) maxCount = d.contributionCount;
  }));
  const q = maxCount > 0 ? maxCount / 4 : 1;

  const pad  = compact ? 4 : 8;
  const W = (IW || widget.offsetWidth)  - pad*2;
  const H = (IH || widget.offsetHeight) - pad*2;
  const cellW = Math.floor((W - (COLS-1)*2) / COLS);
  const cellH = Math.floor((H - (ROWS-1)*2) / ROWS);
  const cell  = Math.min(cellW, cellH); /* no cap — fill the full space */

  const graph = document.createElement('div'); graph.className = 'graph'; graph.setAttribute('aria-hidden','true');

  /* Screen-reader summary — the grid itself is colour-only */
  let total = 0;
  weeks.forEach(w => (w.contributionDays||[]).forEach(d => { total += (d.contributionCount||0); }));
  widget.setAttribute('role','img');
  widget.setAttribute('aria-label', `GitHub contributions: ${total} in the last year`);

  const padded = [];
  for (let i = 0; i < COLS; i++) {
    padded.push(weeks[i] || { contributionDays: Array(7).fill({ contributionCount:0 }) });
  }

  padded.forEach(week => {
    const col = document.createElement('div'); col.className = 'col';
    const days = week.contributionDays || [];
    for (let d = 0; d < ROWS; d++) {
      const day = days[d] || { contributionCount:0 };
      const c   = day.contributionCount || 0;
      const lvl = c === 0 ? 0 : c <= q ? 1 : c <= q*2 ? 2 : c <= q*3 ? 3 : 4;
      const el  = document.createElement('div');
      el.className = `cell l${lvl}`;
      el.style.width  = cell + 'px';
      el.style.height = cell + 'px';
      if (day.date) el.title = `${day.date}: ${c} contribution${c!==1?'s':''}`;
      col.appendChild(el);
    }
    graph.appendChild(col);
  });

  widget.appendChild(graph);
}

function showMsg(txt) {
  const widget = document.getElementById('widget');
  const old = widget.querySelector('.graph'); if (old) old.remove();
  let m = document.getElementById('msg');
  if (!m) { m=document.createElement('div'); m.className='msg'; m.id='msg'; widget.appendChild(m); }
  m.textContent = txt;
}

boot();
</script>
</body>
</html>
