  .wrap{width:100%;height:100%;display:flex;position:relative;}

  /* Medium (360×170) */
  .pad{flex:1;display:flex;align-items:center;gap:8px;padding:18px 20px;min-width:0;}

  .state{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .state .dot{width:7px;height:7px;border-radius:50%;background:var(--grey);}

  .metric .ic{flex:0 0 auto;width:15px;height:15px;color:var(--fg3);display:flex;align-items:center;justify-content:center;}
  .metric .lbl{color:var(--fg2);font-weight:500;}
  .metric .val{font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;}
  .metric.err .val{font-weight:500;white-space:normal;color:var(--fg2);}

  /* country canvas */
  .geo{flex:0 0 auto;position:relative;}
  body.size-medium .geo{width:128px;height:128px;}
  #map{display:block;width:100%;height:100%;}

  /* Small (170×170) */
  body.size-small .pad{flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:7px;padding:12px 12px 14px;}
  body.size-small .geo{width:100%;height:64px;order:-1;}
  body.size-small .info{align-items:center;}
  body.size-small .eyebrow{flex-direction:column;gap:3px;margin-bottom:2px;line-height:1.1;}
  body.size-small .vpn-tag{display:block;font-size:9.5px;letter-spacing:.11em;}
  body.size-small .state{font-size:11.5px;}
  body.size-small .hero{display:block;margin-bottom:0;}
  body.size-small .flag{display:inline;font-size:14px;vertical-align:-1px;margin-right:5px;}
  body.size-small .place{display:inline;font-size:14.5px;letter-spacing:-.02em;-webkit-line-clamp:none;overflow:visible;}
  body.size-small .metrics{display:none}
