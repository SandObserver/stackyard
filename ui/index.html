<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

  <!-- PWA / Add to Homescreen -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stackyard">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Icons -->
  <!-- No sizes attribute on apple-touch-icon — iOS accepts any size and scales it -->
  <link rel="apple-touch-icon" href="/icons/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/png" href="/icons/favicon.png">

  <title>Stackyard</title>
  <link rel="stylesheet" href="/css/tokens.css?v=1">
  <link rel="stylesheet" href="/css/dashboard.css?v=42">
</head>
<body>
<h1 class="visually-hidden">Stackyard</h1>
<div id="ctrls"></div>
<div id="pages" role="main" aria-label="Home screen"></div>
<div id="dots"></div>
<div id="mob-search-pill">
  <div class="msp-search">
    <span class="msp-icon"><svg width="16" height="16" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.4"/><line x1="7.9" y1="7.9" x2="10.5" y2="10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>
    <span class="msp-label">Search</span>
  </div>
  <div class="msp-dots"></div>
</div>
<nav id="dock" aria-label="Dock"></nav>
<div id="spot" role="dialog" aria-modal="true" aria-label="Search" aria-hidden="true">
  <div id="spot-cancel-mob"><button id="spot-cancel-mob-btn" type="button" aria-label="Close search"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="2" y1="2" x2="12" y2="12" stroke="rgba(255,255,255,0.75)" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="2" x2="2" y2="12" stroke="rgba(255,255,255,0.75)" stroke-width="1.8" stroke-linecap="round"/></svg></button></div>
  <div id="sres-live" class="visually-hidden" aria-live="polite"></div>
  <div id="sres"></div>
  <div id="sbox">
    <div class="spot-bar">
      <span class="spot-icon"><svg width="22" height="22" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.6"/><line x1="10.1" y1="10.1" x2="13.5" y2="13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
      <input id="sin" type="text" placeholder="Search…" aria-label="Search apps and folders" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="search">
      <button id="spot-cancel" type="button">Cancel</button>
    </div>
  </div>
</div>
<script type="module" src="/js/dashboard.js?v=46"></script>
</body></html>
