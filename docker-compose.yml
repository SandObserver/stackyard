name: stackyard

services:
  stackyard:
    container_name: stackyard
    image: ghcr.io/sandobserver/stackyard:latest
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    privileged: false
    mem_limit: 384m
    mem_reservation: 96m
    memswap_limit: 384m
    cpu_shares: 90
    pids_limit: 256
    ports:
      - "8700:80"
    # Allows the container to reach services on the host by IP (e.g. http://10.0.0.100:8989).
    # On Linux, containers cannot reach the host's LAN IP without this.
    # host-gateway is a Docker built-in that resolves to the host machine's IP.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
      - ./icons:/icons
      # Optional: CPU temperature sensors
      # - /sys/class/thermal:/sys/class/thermal:ro
      # Optional: disk usage monitoring (add your mount paths)
      # - /mnt/your-drive:/mnt/your-drive:ro
    environment:
      # Optional overrides — defaults shown
      # - CONFIG_PATH=/data/apps.json
      # - ICONS_PATH=/icons
      # - PORT=3000
      # Socket proxy URL for Docker container health monitoring
      # - SOCKET_PROXY_URL=http://socket-proxy:2375
      # Set to true if behind a reverse proxy (Nginx Proxy Manager, Traefik, etc.)
      # - TRUST_PROXY=true
      # Set to true to allow widget URLs using private/LAN IP addresses
      # - ALLOW_PRIVATE_IPS=true
      # Session lifetime in days before re-login is required (default 30)
      # - SESSION_MAX_AGE_DAYS=30
    healthcheck:
      test:
        - CMD
        - wget
        - "-qO-"
        - http://localhost/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stackyard_network
      # Add your reverse proxy network here, e.g.:
      # - proxy-net

networks:
  stackyard_network:
    name: stackyard_network
    driver: bridge
  # proxy-net:
  #   name: proxy-net
  #   external: true
