# Render blueprint for the public demo (https://render.com/docs/blueprint-spec).
# Runs a published release image in demo mode: read-only, bundled sample config,
# no outbound requests.
#
# PORT must be 80. Render routes traffic to whatever PORT says, and nginx is the
# process that serves the dashboard on 80. The API is unaffected: supervisord
# pins PORT=3000 for the API process, and nginx proxies to 127.0.0.1:3000.
services:
  - type: web
    name: stackyard-demo
    runtime: image
    plan: free
    region: oregon
    image:
      url: ghcr.io/sandobserver/stackyard:1.2.0-rc.4
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: PORT
        value: "80"
      - key: TRUST_PROXY
        value: "true"
    healthCheckPath: /health
